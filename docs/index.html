<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKI &amp; Digital Certificates Tutorial</title>
    <meta http-equiv="refresh" content="5;url=en_US/">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #f0f0f0;
        }
        p {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 2rem;
        }
        .languages {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        a.lang {
            display: block;
            padding: 1rem 2rem;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 1.1rem;
            transition: background 0.2s, border-color 0.2s;
        }
        a.lang:hover {
            background: #0f3460;
            border-color: #e94560;
        }
        a.lang span { display: block; font-size: 0.85rem; color: #888; margin-top: 0.25rem; }
        .redirect {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PKI &amp; Digital Certificates Tutorial</h1>
        <p>Select your language / Seleccione su idioma / Selecione seu idioma</p>
        <div class="languages">
            <a class="lang" href="en_US/">English<span>en_US</span></a>
            <a class="lang" href="es_ES/">Español<span>es_ES</span></a>
            <a class="lang" href="pt_BR/">Português<span>pt_BR</span></a>
        </div>
        <p class="redirect">Redirecting to English in 5 seconds&hellip;</p>
    </div>
</body>
</html>
