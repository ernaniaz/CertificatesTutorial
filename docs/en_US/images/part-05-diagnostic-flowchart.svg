<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850" width="1000" height="850">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #333; }
      .arrow { stroke: #1976D2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Certificate Diagnostic Flowchart</text>

  <!-- Start -->
  <ellipse cx="500" cy="70" rx="100" ry="28" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="500" y="75" text-anchor="middle" class="label">Certificate Error Occurred</text>

  <path d="M 500 98 L 500 130" class="arrow"/>

  <!-- Error Type Decision -->
  <polygon points="500,140 600,180 500,220 400,180" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="500" y="178" text-anchor="middle" class="label">Error Type?</text>

  <!-- Branch: Connection Failed -->
  <path d="M 400 180 L 150 180 L 150 240" class="arrow"/>
  <text x="275" y="170" text-anchor="middle" class="small">Connection Failed</text>

  <rect x="70" y="245" width="160" height="60" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="150" y="268" text-anchor="middle" class="label" fill="#1976D2">Check Firewall</text>
  <text x="150" y="288" text-anchor="middle" class="code">firewall-cmd --list-all</text>

  <path d="M 150 305 L 150 340" class="arrow"/>

  <rect x="70" y="345" width="160" height="50" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="150" y="368" text-anchor="middle" class="label" fill="#1976D2">Check Service</text>
  <text x="150" y="385" text-anchor="middle" class="code">systemctl status httpd</text>

  <path d="M 150 395 L 150 430" class="arrow"/>

  <rect x="70" y="435" width="160" height="40" rx="4" fill="#FFF3CD" stroke="#F57C00" stroke-width="1"/>
  <text x="150" y="455" text-anchor="middle" class="code">Open port / Start service</text>

  <!-- Branch: Certificate Invalid -->
  <path d="M 500 220 L 500 260" class="arrow"/>
  <text x="545" y="245" text-anchor="middle" class="small">Cert Invalid</text>

  <polygon points="500,265 580,300 500,335 420,300" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="500" y="297" text-anchor="middle" class="small">Validation</text>
  <text x="500" y="312" text-anchor="middle" class="small">Error?</text>

  <!-- Expired -->
  <path d="M 420 300 L 320 300 L 320 355" class="arrow"/>
  <text x="370" y="290" class="small">Expired</text>

  <rect x="260" y="360" width="120" height="45" rx="4" fill="#FFF3CD" stroke="#F57C00" stroke-width="1"/>
  <text x="320" y="380" text-anchor="middle" class="small">Renew Cert:</text>
  <text x="320" y="395" text-anchor="middle" class="code">certbot/getcert</text>

  <!-- Wrong Hostname -->
  <path d="M 500 335 L 500 380" class="arrow"/>
  <text x="545" y="360" class="small">Wrong Hostname</text>

  <rect x="440" y="385" width="120" height="45" rx="4" fill="#FFF3CD" stroke="#F57C00" stroke-width="1"/>
  <text x="500" y="405" text-anchor="middle" class="small">Check SANs:</text>
  <text x="500" y="420" text-anchor="middle" class="code">openssl x509 -text</text>

  <!-- Untrusted -->
  <path d="M 580 300 L 680 300 L 680 355" class="arrow"/>
  <text x="630" y="290" class="small">Untrusted</text>

  <rect x="620" y="360" width="120" height="45" rx="4" fill="#FFF3CD" stroke="#F57C00" stroke-width="1"/>
  <text x="680" y="380" text-anchor="middle" class="small">Add to Trust:</text>
  <text x="680" y="395" text-anchor="middle" class="code">update-ca-trust</text>

  <!-- Branch: Service Won't Start -->
  <path d="M 600 180 L 850 180 L 850 240" class="arrow"/>
  <text x="725" y="170" text-anchor="middle" class="small">Service Won't Start</text>

  <rect x="770" y="245" width="160" height="50" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="850" y="268" text-anchor="middle" class="label" fill="#1976D2">Check Config</text>
  <text x="850" y="285" text-anchor="middle" class="code">apachectl configtest</text>

  <path d="M 850 295 L 850 330" class="arrow"/>

  <rect x="770" y="335" width="160" height="50" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="850" y="358" text-anchor="middle" class="label" fill="#1976D2">Check Permissions</text>
  <text x="850" y="375" text-anchor="middle" class="code">ls -l /etc/pki/tls/private</text>

  <path d="M 850 385 L 850 420" class="arrow"/>

  <rect x="770" y="425" width="160" height="50" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="850" y="448" text-anchor="middle" class="label" fill="#1976D2">Check SELinux</text>
  <text x="850" y="465" text-anchor="middle" class="code">ausearch -m avc</text>

  <path d="M 850 475 L 850 510" class="arrow"/>

  <rect x="770" y="515" width="160" height="40" rx="4" fill="#FFF3CD" stroke="#F57C00" stroke-width="1"/>
  <text x="850" y="538" text-anchor="middle" class="code">chmod/restorecon</text>

  <!-- Fix Paths Merge -->
  <path d="M 150 475 L 150 750 L 480 750" stroke="#388E3C" stroke-width="1.5" fill="none"/>
  <path d="M 320 405 L 320 680 L 480 680 L 480 750" stroke="#388E3C" stroke-width="1.5" fill="none"/>
  <path d="M 500 430 L 500 680 L 500 750" stroke="#388E3C" stroke-width="1.5" fill="none"/>
  <path d="M 680 405 L 680 680 L 520 680 L 520 750" stroke="#388E3C" stroke-width="1.5" fill="none"/>
  <path d="M 850 555 L 850 680 L 520 680" stroke="#388E3C" stroke-width="1.5" fill="none"/>

  <!-- Final Test -->
  <rect x="420" y="735" width="160" height="40" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="500" y="760" text-anchor="middle" class="label">Final Test</text>

  <path d="M 500 775 L 500 800" class="arrow"/>

  <!-- Success/Escalate Decision -->
  <ellipse cx="400" cy="820" rx="80" ry="25" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="400" y="825" text-anchor="middle" class="label" fill="#388E3C">✓ Resolved</text>

  <ellipse cx="600" cy="820" rx="100" ry="25" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="600" y="825" text-anchor="middle" class="label" fill="#E53935">Need Expert Help</text>

  <!-- Commands Reference Box -->
  <rect x="30" y="505" width="200" height="170" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="130" y="530" text-anchor="middle" class="section-title">Quick Commands</text>
  <text x="45" y="555" class="code">openssl x509 -enddate -noout</text>
  <text x="45" y="575" class="code">openssl verify -CAfile ca.crt</text>
  <text x="45" y="595" class="code">openssl s_client -connect :443</text>
  <text x="45" y="615" class="code">curl -v https://host</text>
  <text x="45" y="635" class="code">journalctl -u httpd</text>
  <text x="45" y="655" class="code">ausearch -m avc -ts recent</text>
</svg>
