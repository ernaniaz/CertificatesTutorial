<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 710" width="1000" height="710">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Crypto-Policy Levels - Detailed Comparison</text>

  <!-- LEGACY Policy -->
  <rect x="30" y="55" width="230" height="340" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <rect x="30" y="55" width="230" height="45" rx="8" fill="#FFC107"/>
  <text x="145" y="85" text-anchor="middle" class="section-title">LEGACY</text>
  <text x="145" y="95" text-anchor="middle" class="small">Backward Compatibility</text>

  <text x="50" y="125" class="label">TLS Versions:</text>
  <text x="60" y="143" class="small">✓ TLS 1.0</text>
  <text x="60" y="158" class="small">✓ TLS 1.1</text>
  <text x="60" y="173" class="small">✓ TLS 1.2</text>
  <text x="60" y="188" class="small">✓ TLS 1.3</text>

  <text x="50" y="215" class="label">Ciphers:</text>
  <text x="60" y="233" class="small">✓ Weak ciphers allowed</text>
  <text x="60" y="248" class="small">✓ SHA-1 HMAC</text>
  <text x="60" y="263" class="small">⚠️ Not recommended</text>

  <text x="50" y="290" class="label">Key Sizes:</text>
  <text x="60" y="308" class="small">✓ RSA 1024+</text>
  <text x="60" y="323" class="small">✓ DH 1024+</text>
  <text x="60" y="338" class="small">⚠️ Below modern standards</text>

  <rect x="45" y="355" width="200" height="30" rx="4" fill="#FFF3CD" stroke="#F57C00" stroke-width="1"/>
  <text x="145" y="375" text-anchor="middle" class="small">Use: Old clients, temp only!</text>

  <!-- DEFAULT Policy -->
  <rect x="280" y="55" width="230" height="340" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="3"/>
  <rect x="280" y="55" width="230" height="45" rx="8" fill="#388E3C"/>
  <text x="395" y="85" text-anchor="middle" class="section-title" fill="#fff">DEFAULT ⭐</text>
  <text x="395" y="95" text-anchor="middle" class="small" fill="#fff">Balanced Security</text>

  <text x="300" y="125" class="label">TLS Versions:</text>
  <text x="310" y="143" class="small">✓ TLS 1.2</text>
  <text x="310" y="158" class="small">✓ TLS 1.3</text>
  <text x="310" y="173" class="small">✗ TLS 1.0/1.1 blocked</text>

  <text x="300" y="200" class="label">Ciphers:</text>
  <text x="310" y="218" class="small">✓ Strong ciphers only</text>
  <text x="310" y="233" class="small">✓ Forward secrecy</text>
  <text x="310" y="248" class="small">✓ AEAD preferred</text>

  <text x="300" y="275" class="label">Key Sizes:</text>
  <text x="310" y="293" class="small">✓ RSA 2048+</text>
  <text x="310" y="308" class="small">✓ DH 2048+</text>
  <text x="310" y="323" class="small">✓ ECDH P-256+</text>

  <rect x="295" y="345" width="200" height="40" rx="4" fill="#D4EDDA" stroke="#388E3C" stroke-width="1"/>
  <text x="395" y="362" text-anchor="middle" class="small">Use: Most environments</text>
  <text x="395" y="378" text-anchor="middle" class="small" fill="#388E3C">✓ Recommended default</text>

  <!-- FUTURE Policy -->
  <rect x="530" y="55" width="230" height="340" rx="8" fill="#E0F7FA" stroke="#00ACC1" stroke-width="2"/>
  <rect x="530" y="55" width="230" height="45" rx="8" fill="#00ACC1"/>
  <text x="645" y="85" text-anchor="middle" class="section-title" fill="#fff">FUTURE</text>
  <text x="645" y="95" text-anchor="middle" class="small" fill="#fff">Strict Security</text>

  <text x="550" y="125" class="label">TLS Versions:</text>
  <text x="560" y="143" class="small">✓ TLS 1.3 only</text>
  <text x="560" y="158" class="small">✗ TLS 1.2 blocked</text>
  <text x="560" y="173" class="small">✗ Older versions blocked</text>

  <text x="550" y="200" class="label">Ciphers:</text>
  <text x="560" y="218" class="small">✓ Only strongest</text>
  <text x="560" y="233" class="small">✓ AEAD mandatory</text>
  <text x="560" y="248" class="small">✓ PFS mandatory</text>

  <text x="550" y="275" class="label">Key Sizes:</text>
  <text x="560" y="293" class="small">✓ RSA 3072+</text>
  <text x="560" y="308" class="small">✓ DH 3072+</text>
  <text x="560" y="323" class="small">✓ ECDH P-384+</text>

  <rect x="545" y="355" width="200" height="30" rx="4" fill="#B2EBF2" stroke="#00ACC1" stroke-width="1"/>
  <text x="645" y="375" text-anchor="middle" class="small">Use: High security, modern clients</text>

  <!-- FIPS Policy -->
  <rect x="780" y="55" width="190" height="340" rx="8" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <rect x="780" y="55" width="190" height="45" rx="8" fill="#E53935"/>
  <text x="875" y="85" text-anchor="middle" class="section-title" fill="#fff">FIPS</text>
  <text x="875" y="95" text-anchor="middle" class="small" fill="#fff">FIPS 140-2/3 Compliance</text>

  <text x="800" y="125" class="label">TLS Versions:</text>
  <text x="810" y="143" class="small">✓ TLS 1.2</text>
  <text x="810" y="158" class="small">✓ TLS 1.3</text>
  <text x="810" y="173" class="small">FIPS-approved only</text>

  <text x="800" y="200" class="label">Ciphers:</text>
  <text x="810" y="218" class="small">✓ FIPS-approved</text>
  <text x="810" y="233" class="small">✓ AES-GCM, AES-CBC</text>
  <text x="810" y="248" class="small">Validated implementations</text>

  <text x="800" y="275" class="label">Key Sizes:</text>
  <text x="810" y="293" class="small">✓ RSA 2048+</text>
  <text x="810" y="308" class="small">✓ ECDSA P-256+</text>
  <text x="810" y="323" class="small">Validated key gen</text>

  <rect x="795" y="355" width="160" height="30" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
  <text x="875" y="375" text-anchor="middle" class="small">Use: Gov/Regulated</text>

  <!-- Commands Section -->
  <rect x="30" y="420" width="450" height="120" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="255" y="445" text-anchor="middle" class="section-title" fill="#1976D2">Switching Policies</text>

  <text x="50" y="475" class="label">Set policy:</text>
  <rect x="150" y="460" width="310" height="25" rx="3" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="305" y="478" text-anchor="middle" class="code">update-crypto-policies --set POLICY</text>

  <text x="50" y="510" class="label">Check current:</text>
  <rect x="150" y="495" width="310" height="25" rx="3" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="305" y="513" text-anchor="middle" class="code">update-crypto-policies --show</text>

  <!-- Custom Policies Section -->
  <rect x="500" y="420" width="470" height="120" rx="6" fill="#FFF9C4" stroke="#F57C00" stroke-width="2"/>
  <text x="735" y="445" text-anchor="middle" class="section-title" fill="#F57C00">Custom Policy Modifiers</text>

  <text x="520" y="475" class="small">Combine base policy with custom modifiers:</text>

  <rect x="520" y="485" width="200" height="20" rx="2" fill="#fff" stroke="#F57C00" stroke-width="1"/>
  <text x="620" y="500" text-anchor="middle" class="code">DEFAULT:NO-SHA1</text>

  <rect x="740" y="485" width="200" height="20" rx="2" fill="#fff" stroke="#F57C00" stroke-width="1"/>
  <text x="840" y="500" text-anchor="middle" class="code">FUTURE:AD-SUPPORT</text>

  <text x="520" y="530" class="small">Custom: /etc/crypto-policies/policies/modules/</text>

  <!-- Security Scale -->
  <rect x="30" y="560" width="940" height="80" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="500" y="585" text-anchor="middle" class="section-title">Security Level Scale</text>

  <!-- Scale bar -->
  <rect x="100" y="595" width="800" height="20" rx="4" fill="none" stroke="#999" stroke-width="1"/>
  <rect x="100" y="595" width="200" height="20" rx="4" fill="#FFC107"/>
  <rect x="300" y="595" width="200" height="20" fill="#388E3C"/>
  <rect x="500" y="595" width="200" height="20" fill="#00ACC1"/>
  <rect x="700" y="595" width="200" height="20" rx="4" fill="#E53935"/>

  <text x="200" y="608" text-anchor="middle" class="small" fill="#333">LEGACY</text>
  <text x="400" y="608" text-anchor="middle" class="small" fill="#fff">DEFAULT</text>
  <text x="600" y="608" text-anchor="middle" class="small" fill="#fff">FUTURE</text>
  <text x="800" y="608" text-anchor="middle" class="small" fill="#fff">FIPS</text>

  <text x="100" y="630" text-anchor="middle" class="small">← Compatibility</text>
  <text x="900" y="630" text-anchor="middle" class="small">Security →</text>

  <!-- Warning -->
  <rect x="30" y="660" width="940" height="50" rx="4" fill="#FFF3CD" stroke="#F57C00" stroke-width="1"/>
  <text x="500" y="685" text-anchor="middle" class="small">⚠️ Changing crypto-policies affects ALL applications system-wide. Test thoroughly before applying in production.</text>
  <text x="500" y="700" text-anchor="middle" class="code">Reboot or restart services after policy change for full effect.</text>
</svg>
