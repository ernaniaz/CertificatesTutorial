<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 9px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 8px; fill: #333; }
    </style>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1976D2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#388E3C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F57C00"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E53935"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" class="title">HashiCorp Vault PKI Flow</text>

  <!-- Main Flow Area -->
  <rect x="20" y="45" width="860" height="400" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Row 1: Authentication & Setup -->
  <rect x="40" y="60" width="250" height="90" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="165" y="82" text-anchor="middle" class="section-title" fill="#1976D2">1. Authentication</text>
  <text x="55" y="102" class="small">App → Vault</text>
  <text x="55" y="117" class="small">Methods: Token, AppRole, K8s SA</text>
  <text x="55" y="132" class="small">Result: Access token with PKI policy</text>

  <path d="M 290 105 L 340 105" stroke="#1976D2" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <rect x="340" y="60" width="250" height="90" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="465" y="82" text-anchor="middle" class="section-title" fill="#388E3C">2. PKI Setup (One-time)</text>
  <text x="355" y="102" class="code">vault secrets enable pki</text>
  <text x="355" y="117" class="code">vault write pki/root/generate/internal</text>
  <text x="355" y="132" class="code">vault write pki/roles/my-role ...</text>

  <path d="M 465 150 L 465 170" stroke="#1976D2" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Row 2: Certificate Issuance (Main Flow) -->
  <rect x="40" y="170" width="550" height="130" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="315" y="192" text-anchor="middle" class="section-title" fill="#F57C00">3. Dynamic Certificate Issuance</text>

  <!-- Sub-flow inside issuance -->
  <rect x="55" y="205" width="100" height="40" rx="4" fill="#fff" stroke="#F57C00"/>
  <text x="105" y="222" text-anchor="middle" class="small">Request</text>
  <text x="105" y="235" text-anchor="middle" class="code">vault write</text>

  <path d="M 155 225 L 185 225" stroke="#F57C00" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>

  <rect x="185" y="205" width="100" height="40" rx="4" fill="#fff" stroke="#F57C00"/>
  <text x="235" y="222" text-anchor="middle" class="small">Validate</text>
  <text x="235" y="235" text-anchor="middle" class="code">Check role</text>

  <path d="M 285 225 L 315 225" stroke="#F57C00" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>

  <rect x="315" y="205" width="100" height="40" rx="4" fill="#fff" stroke="#F57C00"/>
  <text x="365" y="222" text-anchor="middle" class="small">Generate</text>
  <text x="365" y="235" text-anchor="middle" class="code">Key + CSR</text>

  <path d="M 415 225 L 445 225" stroke="#F57C00" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>

  <rect x="445" y="205" width="130" height="40" rx="4" fill="#F57C00" stroke="#E65100"/>
  <text x="510" y="222" text-anchor="middle" class="small" fill="#fff">Sign with CA</text>
  <text x="510" y="235" text-anchor="middle" class="code" fill="#fff">Return cert</text>

  <!-- Output -->
  <text x="55" y="268" class="small" fill="#F57C00">Output: certificate + private_key + ca_chain + serial_number + expiration</text>
  <text x="55" y="283" class="code">vault write pki_int/issue/my-role common_name="app.example.com" ttl="24h"</text>

  <path d="M 165 300 L 165 320" stroke="#1976D2" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Row 3: Install, Renewal, Revocation -->
  <rect x="40" y="320" width="250" height="100" rx="6" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="165" y="342" text-anchor="middle" class="section-title" fill="#388E3C">4. Install &amp; Use</text>
  <text x="55" y="365" class="small">• Store cert/key in app or secret store</text>
  <text x="55" y="380" class="small">• Configure TLS on service</text>
  <text x="55" y="395" class="small">• Short TTL (hours to days)</text>

  <path d="M 290 370 L 340 370" stroke="#1976D2" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <rect x="340" y="320" width="250" height="100" rx="6" fill="#CFE2FF" stroke="#1976D2" stroke-width="2"/>
  <text x="465" y="342" text-anchor="middle" class="section-title" fill="#1976D2">5. Auto-Renewal</text>
  <text x="355" y="365" class="small">Before expiration:</text>
  <text x="355" y="380" class="small">• Request new certificate</text>
  <text x="355" y="395" class="small">• Same process as step 3</text>

  <path d="M 590 370 L 640 370" stroke="#1976D2" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Renewal loop arrow -->
  <path d="M 590 350 L 615 350 L 615 235 L 590 235" stroke="#1976D2" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="605" y="265" class="small" fill="#1976D2" style="writing-mode: tb; glyph-orientation-vertical: 0;">Renewal cycle</text>

  <!-- Revocation -->
  <rect x="640" y="170" width="220" height="250" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="750" y="195" text-anchor="middle" class="section-title" fill="#E53935">6. Revocation</text>
  <text x="750" y="212" text-anchor="middle" class="small">(if compromised)</text>

  <text x="655" y="240" class="code">vault write pki_int/revoke \</text>
  <text x="665" y="255" class="code">serial_number="XX:XX:XX"</text>

  <rect x="660" y="275" width="180" height="50" rx="4" fill="#fff" stroke="#E53935"/>
  <text x="750" y="295" text-anchor="middle" class="small" fill="#E53935">Certificate added to CRL</text>
  <text x="750" y="310" text-anchor="middle" class="code" fill="#E53935">vault read pki_int/crl</text>

  <path d="M 750 325 L 750 345" stroke="#E53935" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>

  <rect x="660" y="350" width="180" height="55" rx="4" fill="#FFCDD2" stroke="#E53935"/>
  <text x="750" y="370" text-anchor="middle" class="small" fill="#C62828">Clients check CRL</text>
  <text x="750" y="385" text-anchor="middle" class="small" fill="#C62828">Reject revoked certs</text>

  <!-- Benefits Section -->
  <rect x="20" y="460" width="860" height="130" rx="8" fill="#fff" stroke="#BDBDBD" stroke-width="1"/>
  <text x="450" y="482" text-anchor="middle" class="section-title">Vault PKI Benefits</text>

  <rect x="40" y="495" width="195" height="80" rx="4" fill="#E8F5E9" stroke="#388E3C"/>
  <text x="137" y="518" text-anchor="middle" class="label" fill="#388E3C">🔐 Short-Lived</text>
  <text x="55" y="540" class="small">• TTL: seconds to days</text>
  <text x="55" y="555" class="small">• Reduced attack window</text>

  <rect x="255" y="495" width="195" height="80" rx="4" fill="#E8F5E9" stroke="#388E3C"/>
  <text x="352" y="518" text-anchor="middle" class="label" fill="#388E3C">⚡ Automated</text>
  <text x="270" y="540" class="small">• API-driven issuance</text>
  <text x="270" y="555" class="small">• No manual CSR process</text>

  <rect x="470" y="495" width="195" height="80" rx="4" fill="#E8F5E9" stroke="#388E3C"/>
  <text x="567" y="518" text-anchor="middle" class="label" fill="#388E3C">📋 Audited</text>
  <text x="485" y="540" class="small">• Full audit trail</text>
  <text x="485" y="555" class="small">• Policy enforcement</text>

  <rect x="685" y="495" width="175" height="80" rx="4" fill="#E8F5E9" stroke="#388E3C"/>
  <text x="772" y="518" text-anchor="middle" class="label" fill="#388E3C">🔌 Integrated</text>
  <text x="700" y="540" class="small">• K8s, Consul, Nomad</text>
  <text x="700" y="555" class="small">• cert-manager, Terraform</text>
</svg>
