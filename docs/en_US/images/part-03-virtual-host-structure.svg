<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" width="1000" height="660">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Apache SSL VirtualHost Structure</text>

  <!-- VirtualHost Container -->
  <rect x="30" y="50" width="600" height="600" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="3"/>
  <rect x="30" y="50" width="600" height="40" rx="8" fill="#1976D2"/>
  <text x="330" y="77" text-anchor="middle" class="code" fill="#fff">&lt;VirtualHost *:443&gt;</text>

  <!-- Basic Settings Section -->
  <rect x="50" y="105" width="260" height="120" rx="6" fill="#fff" stroke="#1976D2" stroke-width="1.5"/>
  <text x="180" y="125" text-anchor="middle" class="section-title" fill="#1976D2">Basic Settings</text>
  <text x="65" y="150" class="code">ServerName example.com</text>
  <text x="65" y="168" class="code">ServerAlias www.example.com</text>
  <text x="65" y="186" class="code">DocumentRoot /var/www/html</text>
  <text x="65" y="204" class="code">ErrorLog /var/log/httpd/ssl_error</text>

  <!-- SSL Configuration Section -->
  <rect x="330" y="105" width="280" height="120" rx="6" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="470" y="125" text-anchor="middle" class="section-title" fill="#388E3C">SSL/TLS Configuration</text>
  <text x="345" y="150" class="code">SSLEngine on</text>
  <text x="345" y="168" class="code">SSLCertificateFile</text>
  <text x="355" y="183" class="code" fill="#388E3C">/etc/pki/tls/certs/server.crt</text>
  <text x="345" y="200" class="code">SSLCertificateKeyFile</text>
  <text x="355" y="215" class="code" fill="#E53935">/etc/pki/tls/private/server.key</text>

  <!-- RHEL Version Specific -->
  <rect x="50" y="240" width="560" height="140" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="330" y="265" text-anchor="middle" class="section-title" fill="#F57C00">RHEL Version-Specific Crypto Configuration</text>

  <!-- RHEL 7 -->
  <rect x="65" y="285" width="250" height="80" rx="4" fill="#FFF3CD" stroke="#F57C00" stroke-width="1"/>
  <text x="190" y="305" text-anchor="middle" class="label">RHEL 7 (Manual Config)</text>
  <text x="80" y="325" class="code">SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1</text>
  <text x="80" y="340" class="code">SSLCipherSuite HIGH:!aNULL:!MD5</text>
  <text x="80" y="355" class="code">SSLHonorCipherOrder on</text>

  <!-- RHEL 8+ -->
  <rect x="340" y="285" width="250" height="80" rx="4" fill="#D4EDDA" stroke="#388E3C" stroke-width="1"/>
  <text x="465" y="305" text-anchor="middle" class="label" fill="#388E3C">RHEL 8+ (Crypto-Policies) ⭐</text>
  <text x="355" y="325" class="code">Include /etc/crypto-policies/</text>
  <text x="365" y="340" class="code">back-ends/opensslcnf.config</text>
  <text x="355" y="355" class="small">Policies handle TLS/ciphers</text>

  <!-- Security Headers Section -->
  <rect x="50" y="395" width="280" height="100" rx="6" fill="#CFE2FF" stroke="#1976D2" stroke-width="1.5"/>
  <text x="190" y="415" text-anchor="middle" class="section-title" fill="#1976D2">Security Headers</text>
  <text x="65" y="440" class="code">Header always set</text>
  <text x="75" y="455" class="code">Strict-Transport-Security</text>
  <text x="75" y="470" class="code">"max-age=31536000"</text>
  <text x="65" y="485" class="code">Header always set X-Frame-Options</text>

  <!-- Directory Settings -->
  <rect x="350" y="395" width="260" height="100" rx="6" fill="#fff" stroke="#1976D2" stroke-width="1.5"/>
  <text x="480" y="415" text-anchor="middle" class="section-title" fill="#1976D2">Directory Settings</text>
  <text x="365" y="440" class="code">&lt;Directory /var/www/html&gt;</text>
  <text x="375" y="455" class="code">Options -Indexes +FollowSymLinks</text>
  <text x="375" y="470" class="code">Require all granted</text>
  <text x="365" y="485" class="code">&lt;/Directory&gt;</text>

  <!-- Chain File (Optional) -->
  <rect x="50" y="510" width="560" height="45" rx="4" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
  <text x="70" y="532" class="code">SSLCertificateChainFile /etc/pki/tls/certs/chain.crt</text>
  <text x="450" y="545" class="small">(Optional - include intermediates)</text>

  <!-- Close Tag -->
  <rect x="50" y="570" width="560" height="30" rx="4" fill="#1976D2"/>
  <text x="330" y="590" text-anchor="middle" class="code" fill="#fff">&lt;/VirtualHost&gt;</text>

  <!-- Common Mistakes Section -->
  <rect x="660" y="50" width="310" height="280" rx="8" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="815" y="80" text-anchor="middle" class="section-title" fill="#E53935">Common Mistakes</text>

  <text x="680" y="110" class="small" fill="#E53935">❌ Wrong file paths</text>
  <text x="690" y="130" class="code">Certificate/key file not found</text>

  <text x="680" y="155" class="small" fill="#E53935">❌ Private key mode 644</text>
  <text x="690" y="175" class="code">Must be mode 600 or 400</text>

  <text x="680" y="200" class="small" fill="#E53935">❌ Missing SANs in certificate</text>
  <text x="690" y="220" class="code">RHEL 9+ requires SANs</text>

  <text x="680" y="245" class="small" fill="#E53935">❌ No chain file</text>
  <text x="690" y="265" class="code">Clients can't verify trust</text>

  <text x="680" y="290" class="small" fill="#E53935">❌ Weak ciphers on RHEL 7</text>
  <text x="690" y="310" class="code">Manually harden config</text>

  <!-- Best Practices -->
  <rect x="660" y="350" width="310" height="200" rx="8" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="815" y="380" text-anchor="middle" class="section-title" fill="#388E3C">Best Practices</text>

  <text x="680" y="410" class="small" fill="#388E3C">✓ Use crypto-policies (RHEL 8+)</text>
  <text x="680" y="435" class="small" fill="#388E3C">✓ Private key: chmod 600</text>
  <text x="680" y="460" class="small" fill="#388E3C">✓ Include certificate chain</text>
  <text x="680" y="485" class="small" fill="#388E3C">✓ Add HSTS header</text>
  <text x="680" y="510" class="small" fill="#388E3C">✓ Test with: openssl s_client</text>
  <text x="680" y="535" class="small" fill="#388E3C">✓ Validate with: httpd -t</text>

  <!-- Quick Test Commands -->
  <rect x="660" y="570" width="310" height="80" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="815" y="595" text-anchor="middle" class="section-title">Quick Test Commands</text>
  <text x="680" y="620" class="code">httpd -t</text>
  <text x="680" y="638" class="code">openssl s_client -connect host:443</text>
</svg>
