<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
      .arrow { stroke: #1976D2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Certificate Fingerprint Calculation</text>

  <!-- Start -->
  <ellipse cx="215" cy="80" rx="90" ry="30" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="215" y="85" text-anchor="middle" class="label">Calculate Fingerprint</text>

  <path d="M 215 110 L 215 150" class="arrow"/>

  <!-- Choose Algorithm -->
  <polygon points="215,150 315,200 215,250 115,200" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="215" y="195" text-anchor="middle" class="label">Hash</text>
  <text x="215" y="212" text-anchor="middle" class="label">Algorithm?</text>

  <!-- Algorithm Options -->
  <path d="M 115 200 L 85 200 L 85 300" stroke="#1976D2" stroke-width="1.5" fill="none"/>
  <path d="M 215 250 L 215 300" stroke="#1976D2" stroke-width="1.5" fill="none"/>
  <path d="M 315 200 L 345 200 L 345 300" stroke="#1976D2" stroke-width="1.5" fill="none"/>

  <!-- MD5 (Deprecated) -->
  <rect x="30" y="300" width="110" height="55" rx="4" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="85" y="323" text-anchor="middle" class="label">MD5</text>
  <text x="85" y="342" text-anchor="middle" class="small" fill="#E53935">⚠️ Insecure</text>

  <!-- SHA-1 (Deprecated) -->
  <rect x="160" y="300" width="110" height="55" rx="4" fill="#FFF3CD" stroke="#F57C00" stroke-width="1.5"/>
  <text x="215" y="323" text-anchor="middle" class="label">SHA-1</text>
  <text x="215" y="342" text-anchor="middle" class="small" fill="#F57C00">⚠️ Deprecated</text>

  <!-- SHA-256 (Recommended) -->
  <rect x="290" y="300" width="110" height="55" rx="4" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="345" y="323" text-anchor="middle" class="label" fill="#388E3C">SHA-256</text>
  <text x="345" y="342" text-anchor="middle" class="small" fill="#388E3C">✓ Recommended</text>

  <!-- Process Flow -->
  <rect x="430" y="70" width="540" height="300" rx="8" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="700" y="95" text-anchor="middle" class="section-title">Fingerprint Process</text>

  <!-- Step 1 -->
  <rect x="450" y="115" width="200" height="55" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1.5"/>
  <text x="550" y="138" text-anchor="middle" class="label">1. Load Certificate</text>
  <text x="550" y="158" text-anchor="middle" class="small">Read DER-encoded data</text>

  <path d="M 650 142 L 700 142" class="arrow"/>

  <!-- Step 2 -->
  <rect x="700" y="115" width="250" height="55" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1.5"/>
  <text x="825" y="138" text-anchor="middle" class="label">2. Extract Certificate Data</text>
  <text x="825" y="158" text-anchor="middle" class="small">Complete cert (excluding PEM headers)</text>

  <!-- Step 3 -->
  <path d="M 825 170 L 825 200" class="arrow"/>

  <rect x="500" y="200" width="400" height="55" rx="4" fill="#FFC107" stroke="#F57C00" stroke-width="1.5"/>
  <text x="700" y="223" text-anchor="middle" class="label">3. Apply Hash Function</text>
  <text x="700" y="243" text-anchor="middle" class="code">openssl x509 -noout -fingerprint -sha256 -in cert.crt</text>

  <!-- Output -->
  <path d="M 700 255 L 700 280" class="arrow"/>

  <rect x="500" y="280" width="400" height="70" rx="4" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="700" y="305" text-anchor="middle" class="label" fill="#388E3C">Fingerprint Output</text>
  <text x="700" y="325" text-anchor="middle" class="code">SHA256 Fingerprint=AB:CD:EF:01:23:45:67:89:...</text>
  <text x="700" y="342" text-anchor="middle" class="small">(64 hex characters for SHA-256)</text>

  <!-- Use Cases Section -->
  <rect x="30" y="400" width="940" height="140" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="500" y="425" text-anchor="middle" class="section-title" fill="#1976D2">Common Use Cases</text>

  <!-- Use Case 1 -->
  <rect x="60" y="445" width="200" height="75" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="160" y="468" text-anchor="middle" class="label">Certificate Pinning</text>
  <text x="160" y="488" text-anchor="middle" class="small">Verify specific certificate</text>
  <text x="160" y="505" text-anchor="middle" class="small">in mobile/web apps</text>

  <!-- Use Case 2 -->
  <rect x="290" y="445" width="200" height="75" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="390" y="468" text-anchor="middle" class="label">Quick Comparison</text>
  <text x="390" y="488" text-anchor="middle" class="small">Compare certificates</text>
  <text x="390" y="505" text-anchor="middle" class="small">without reading content</text>

  <!-- Use Case 3 -->
  <rect x="520" y="445" width="200" height="75" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="620" y="468" text-anchor="middle" class="label">Trust Verification</text>
  <text x="620" y="488" text-anchor="middle" class="small">Out-of-band validation</text>
  <text x="620" y="505" text-anchor="middle" class="small">via phone/secure channel</text>

  <!-- Use Case 4 -->
  <rect x="750" y="445" width="200" height="75" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="850" y="468" text-anchor="middle" class="label">Documentation</text>
  <text x="850" y="488" text-anchor="middle" class="small">Identify certificates</text>
  <text x="850" y="505" text-anchor="middle" class="small">in records/logs</text>

  <!-- Important Notes -->
  <rect x="30" y="560" width="940" height="120" rx="6" fill="#FFF9C4" stroke="#F57C00" stroke-width="1"/>
  <text x="500" y="585" text-anchor="middle" class="section-title" fill="#F57C00">Important Notes</text>

  <text x="80" y="610" class="small">• Fingerprint is NOT part of the certificate - it's calculated from the certificate data</text>
  <text x="80" y="630" class="small">• Same certificate = Same fingerprint (regardless of file format - PEM or DER)</text>
  <text x="80" y="650" class="small">• Different hash algorithms produce different fingerprints for the same certificate</text>
  <text x="80" y="670" class="small">• SHA-256 is recommended; SHA-1 and MD5 are deprecated due to security weaknesses</text>
</svg>
