<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #333; }
      .arrow { stroke: #1976D2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Arquitetura Zero Trust com PKI</text>
  <text x="980" y="20" text-anchor="end" class="code">Apêndice C</text>

  <!-- Zero Trust Principle -->
  <rect x="350" y="50" width="300" height="45" rx="6" fill="#0066CC" stroke="#004C99" stroke-width="3"/>
  <text x="500" y="73" text-anchor="middle" class="label" fill="#fff">Princípio Zero Trust:</text>
  <text x="500" y="88" text-anchor="middle" class="small" fill="#fff">Nunca Confiar, Sempre Verificar</text>

  <!-- Three Pillars -->
  <rect x="30" y="115" width="300" height="200" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="180" y="140" text-anchor="middle" class="section-title" fill="#388E3C">Identidade Forte (PKI)</text>

  <rect x="40" y="160" width="135" height="65" rx="4" fill="#CFE2FF" stroke="#1976D2" stroke-width="1"/>
  <text x="110" y="180" text-anchor="middle" class="label" fill="#1976D2">Dispositivos</text>
  <text x="45" y="200" class="code">• Único p/dispositivo</text>
  <text x="45" y="215" class="code">• Chaves de hardware</text>

  <rect x="185" y="160" width="135" height="65" rx="4" fill="#CFE2FF" stroke="#1976D2" stroke-width="1"/>
  <text x="250" y="180" text-anchor="middle" class="label" fill="#1976D2">Usuários</text>
  <text x="190" y="200" class="code">• Cartões inteligentes</text>
  <text x="190" y="215" class="code">• Tokens de software</text>

  <rect x="40" y="240" width="280" height="55" rx="4" fill="#CFE2FF" stroke="#1976D2" stroke-width="1"/>
  <text x="180" y="260" text-anchor="middle" class="label" fill="#1976D2">Serviços (mTLS)</text>
  <text x="60" y="280" class="code">Service mesh • Autent. microsserviços</text>

  <!-- Continuous Verification -->
  <rect x="350" y="115" width="300" height="200" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="500" y="140" text-anchor="middle" class="section-title" fill="#F57C00">Verificação Contínua</text>

  <rect x="370" y="160" width="260" height="40" rx="4" fill="#fff" stroke="#F57C00" stroke-width="1"/>
  <text x="500" y="178" text-anchor="middle" class="small">Autenticação: Certificado valida identidade</text>

  <rect x="370" y="210" width="260" height="40" rx="4" fill="#fff" stroke="#F57C00" stroke-width="1"/>
  <text x="500" y="228" text-anchor="middle" class="small">Autorização: Motor de políticas verifica</text>

  <rect x="370" y="260" width="260" height="40" rx="4" fill="#fff" stroke="#F57C00" stroke-width="1"/>
  <text x="500" y="278" text-anchor="middle" class="small">Postura: Verificação de conformidade</text>

  <!-- Least Privilege & Encryption -->
  <rect x="670" y="115" width="300" height="200" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="820" y="140" text-anchor="middle" class="section-title" fill="#1976D2">Mínimo Privilégio + Criptografia</text>

  <rect x="690" y="160" width="130" height="70" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="755" y="185" text-anchor="middle" class="label" fill="#1976D2">Decisão de Acesso</text>
  <text x="700" y="210" class="small" fill="#388E3C">✓ Permitir</text>
  <text x="700" y="225" class="small" fill="#E53935">✗ Negar</text>

  <rect x="840" y="160" width="110" height="70" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="895" y="185" text-anchor="middle" class="label" fill="#1976D2">TLS em Tudo</text>
  <text x="850" y="205" class="code">Leste-Oeste</text>
  <text x="850" y="218" class="code">Norte-Sul</text>

  <rect x="690" y="245" width="260" height="55" rx="4" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
  <text x="820" y="268" text-anchor="middle" class="label" fill="#388E3C">Monitoramento Contínuo</text>
  <text x="700" y="288" class="code">Logs auditoria • Detecção anomalias</text>

  <!-- PKI Components -->
  <rect x="30" y="335" width="460" height="170" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="2"/>
  <text x="260" y="360" text-anchor="middle" class="section-title">Componentes PKI em Zero Trust</text>

  <rect x="50" y="380" width="200" height="55" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="150" y="400" text-anchor="middle" class="label" fill="#1976D2">Autoridade Certificadora</text>
  <text x="60" y="420" class="small">Certs curta vida, baseado em API</text>

  <rect x="270" y="380" width="200" height="55" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="370" y="400" text-anchor="middle" class="label" fill="#1976D2">Vault / Gestão Segredos</text>
  <text x="280" y="420" class="small">Segredos dinâmicos, rotação</text>

  <rect x="50" y="450" width="200" height="45" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="150" y="475" text-anchor="middle" class="label" fill="#1976D2">SPIFFE/SPIRE</text>

  <rect x="270" y="450" width="200" height="45" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="370" y="475" text-anchor="middle" class="label" fill="#1976D2">cert-manager</text>

  <!-- RHEL Integration -->
  <rect x="510" y="335" width="460" height="170" rx="6" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
  <text x="740" y="360" text-anchor="middle" class="section-title" fill="#E91E63">Implementação no RHEL</text>

  <rect x="530" y="380" width="200" height="55" rx="4" fill="#fff" stroke="#E91E63" stroke-width="1"/>
  <text x="630" y="400" text-anchor="middle" class="label" fill="#E91E63">FreeIPA</text>
  <text x="540" y="418" class="small">CA empresarial, Perfis de certs</text>

  <rect x="750" y="380" width="200" height="55" rx="4" fill="#fff" stroke="#E91E63" stroke-width="1"/>
  <text x="850" y="400" text-anchor="middle" class="label" fill="#E91E63">SELinux</text>
  <text x="760" y="418" class="small">Contextos certs, MAC, Limites</text>

  <rect x="530" y="450" width="200" height="45" rx="4" fill="#fff" stroke="#E91E63" stroke-width="1"/>
  <text x="630" y="478" text-anchor="middle" class="label" fill="#E91E63">firewalld (microseg)</text>

  <rect x="750" y="450" width="200" height="45" rx="4" fill="#fff" stroke="#E91E63" stroke-width="1"/>
  <text x="850" y="478" text-anchor="middle" class="label" fill="#E91E63">segurança systemd</text>

  <!-- Verification Flow -->
  <rect x="30" y="525" width="940" height="150" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="500" y="550" text-anchor="middle" class="section-title" fill="#388E3C">Fluxo de Verificação</text>

  <rect x="60" y="575" width="150" height="40" rx="4" fill="#fff" stroke="#388E3C"/>
  <text x="135" y="600" text-anchor="middle" class="small">1. Apresentar Certificado</text>
  <path d="M 210 595 L 250 595" class="arrow"/>

  <rect x="250" y="575" width="150" height="40" rx="4" fill="#fff" stroke="#388E3C"/>
  <text x="325" y="595" text-anchor="middle" class="small">2. Verificar Cert</text>
  <text x="325" y="608" text-anchor="middle" class="code">Revogado? Confiável?</text>
  <path d="M 400 595 L 440 595" class="arrow"/>

  <rect x="440" y="575" width="150" height="40" rx="4" fill="#fff" stroke="#388E3C"/>
  <text x="515" y="595" text-anchor="middle" class="small">3. Verificar Postura</text>
  <text x="515" y="608" text-anchor="middle" class="code">Atualizado? Conforme?</text>
  <path d="M 590 595 L 630 595" class="arrow"/>

  <rect x="630" y="575" width="150" height="40" rx="4" fill="#fff" stroke="#388E3C"/>
  <text x="705" y="595" text-anchor="middle" class="small">4. Avaliar Política</text>
  <text x="705" y="608" text-anchor="middle" class="code">Usuário autorizado?</text>
  <path d="M 780 595 L 820 595" class="arrow"/>

  <rect x="820" y="575" width="130" height="40" rx="4" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="885" y="595" text-anchor="middle" class="small" fill="#388E3C">5. Conceder Acesso</text>
  <text x="885" y="608" text-anchor="middle" class="code" fill="#388E3C">Tempo limitado</text>

  <!-- Access Decision Results -->
  <rect x="60" y="630" width="200" height="35" rx="4" fill="#D4EDDA" stroke="#388E3C" stroke-width="1.5"/>
  <text x="160" y="653" text-anchor="middle" class="label" fill="#388E3C">✓ Acesso Concedido</text>

  <rect x="280" y="630" width="200" height="35" rx="4" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="380" y="653" text-anchor="middle" class="label" fill="#E53935">✗ Acesso Negado</text>

  <rect x="500" y="630" width="250" height="35" rx="4" fill="#E53935" stroke="#C62828" stroke-width="1.5"/>
  <text x="625" y="653" text-anchor="middle" class="label" fill="#fff">Suspeito → Revogar Cert</text>

  <!-- Legend -->
  <rect x="30" y="695" width="940" height="55" rx="4" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="500" y="720" text-anchor="middle" class="section-title">Princípio Chave: Cada requisição verificada, acesso mínimo, criptografia total, monitoramento contínuo</text>
  <text x="500" y="740" text-anchor="middle" class="small">PKI habilita: Vinculação de identidade forte, mTLS em tudo, revogação instantânea, ciclo de vida automatizado</text>
</svg>
