<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 850" width="900" height="850">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
      .step-num { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #fff; }
      .arrow-right { stroke: #1565C0; stroke-width: 2; fill: none; marker-end: url(#arrowR); }
      .arrow-left { stroke: #2E7D32; stroke-width: 2; fill: none; marker-end: url(#arrowL); }
    </style>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#1565C0"/></marker>
    <marker id="arrowL" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#2E7D32"/></marker>
  </defs>


  <text x="450" y="30" text-anchor="middle" class="title">Handshake TLS 1.2 com RSA &#8212; Passo a Passo</text>

  <!-- Client column -->
  <rect x="30" y="50" width="200" height="790" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="130" y="75" text-anchor="middle" class="section-title" style="fill:#1565C0">Cliente (Navegador)</text>

  <!-- Server column -->
  <rect x="670" y="50" width="200" height="790" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="770" y="75" text-anchor="middle" class="section-title" style="fill:#2E7D32">Servidor (banco.com)</text>

  <!-- Step 1 -->
  <circle cx="60" cy="110" r="14" fill="#1565C0"/>
  <text x="60" y="115" text-anchor="middle" class="step-num">1</text>
  <text x="85" y="107" class="section-title" style="fill:#1565C0">CLIENT HELLO</text>
  <text x="50" y="135" class="small">TLS 1.2, cifras suportadas</text>
  <text x="50" y="148" class="small">ClientRandom (28 bytes)</text>
  <path d="M 230 120 L 668 120" class="arrow-right"/>

  <!-- Step 2 -->
  <circle cx="840" cy="175" r="14" fill="#2E7D32"/>
  <text x="840" y="180" text-anchor="middle" class="step-num">2</text>
  <text x="690" y="172" class="section-title" style="fill:#2E7D32">SERVER HELLO</text>
  <text x="690" y="190" class="small">Cifra escolhida: AES-256-GCM</text>
  <text x="690" y="203" class="small">ServerRandom (28 bytes)</text>
  <path d="M 668 185 L 232 185" class="arrow-left"/>

  <!-- Step 3 -->
  <rect x="690" y="232" width="170" height="85" rx="4" fill="#FAFAFA" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="840" cy="250" r="14" fill="#2E7D32"/>
  <text x="840" y="255" text-anchor="middle" class="step-num">3</text>
  <text x="695" y="248" class="section-title" style="fill:#2E7D32">CERTIFICADO</text>
  <text x="700" y="265" class="code">CN=banco.com</text>
  <text x="700" y="280" class="code">Emissor: DigiCert CA</text>
  <text x="700" y="295" class="code">PubKey: [RSA 2048]</text>
  <text x="700" y="308" class="code">Assinatura: [DigiCert &#10004;]</text>
  <path d="M 668 270 L 232 270" class="arrow-left"/>

  <!-- Step 4 -->
  <circle cx="60" cy="345" r="14" fill="#FF6F00"/>
  <text x="60" y="350" text-anchor="middle" class="step-num">4</text>
  <rect x="40" y="365" width="180" height="110" rx="4" fill="#FFF3E0" stroke="#FF6F00" stroke-width="1.5"/>
  <text x="50" y="382" class="section-title" style="fill:#E65100">VERIFICAÇÃO</text>
  <text x="50" y="400" class="small">&#10004; Expirado? Não</text>
  <text x="50" y="415" class="small">&#10004; SAN válido? Sim</text>
  <text x="50" y="430" class="small">&#10004; Assinatura CA? Válida</text>
  <text x="50" y="445" class="small">&#10004; CA confiável? Sim</text>
  <text x="50" y="460" class="small">&#10004; Revogado? Não</text>

  <!-- Step 5 -->
  <circle cx="60" cy="505" r="14" fill="#1565C0"/>
  <text x="60" y="510" text-anchor="middle" class="step-num">5</text>
  <text x="85" y="502" class="section-title" style="fill:#1565C0">TROCA DE CHAVES</text>
  <text x="50" y="530" class="small">PreMasterSecret (48 bytes)</text>
  <text x="50" y="545" class="small">Cifrado com chave PÚB. do servidor</text>
  <path d="M 230 515 L 668 515" class="arrow-right"/>
  <rect x="690" y="500" width="170" height="40" rx="4" fill="#FAFAFA" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="700" y="516" class="small" style="fill:#2E7D32">Decifra com chave</text>
  <text x="700" y="530" class="small" font-weight="bold" style="fill:#2E7D32">PRIVADA do servidor</text>

  <!-- Step 6 -->
  <rect x="250" y="560" width="400" height="90" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <circle cx="270" cy="580" r="14" fill="#7B1FA2"/>
  <text x="270" y="585" text-anchor="middle" class="step-num">6</text>
  <text x="295" y="585" class="section-title" style="fill:#7B1FA2">DERIVAÇÃO DE CHAVES (ambos os lados)</text>
  <text x="270" y="605" class="code">MasterSecret = PRF(PreMaster, randoms)</text>
  <text x="270" y="620" class="small">&#8594; client_write_key (AES para cliente&#8594;servidor)</text>
  <text x="270" y="635" class="small">&#8594; server_write_key (AES para servidor&#8594;cliente)</text>

  <!-- Step 7-8 -->
  <circle cx="60" cy="680" r="14" fill="#1565C0"/>
  <text x="60" y="685" text-anchor="middle" class="step-num">7</text>
  <text x="85" y="682" class="small" style="fill:#1565C0">ALTERA ALGORITMO &#8594;</text>
  <path d="M 230 680 L 668 680" class="arrow-right"/>
  <circle cx="840" cy="710" r="14" fill="#2E7D32"/>
  <text x="840" y="715" text-anchor="middle" class="step-num">8</text>
  <text x="690" y="712" class="small" style="fill:#2E7D32">&#8592; ALTERA ALGORITMO</text>
  <path d="M 668 710 L 232 710" class="arrow-left"/>

  <!-- Step 9 -->
  <rect x="100" y="740" width="700" height="80" rx="8" fill="#E8F5E9" stroke="#FF6F00" stroke-width="3"/>
  <circle cx="120" cy="760" r="14" fill="#FF6F00"/>
  <text x="120" y="765" text-anchor="middle" class="step-num">9</text>
  <text x="145" y="765" class="section-title" style="fill:#FF6F00">DADOS CRIPTOGRAFADOS (AES-256-GCM)</text>
  <text x="120" y="788" class="small">Toda a comunicação posterior usa criptografia simétrica rápida</text>
  <text x="120" y="805" class="label" font-weight="bold" style="fill:#2E7D32">&#10004; Confidencialidade  &#10004; Integridade  &#10004; Autenticidade  &#10004; Não-repúdio</text>
</svg>
