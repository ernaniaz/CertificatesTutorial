<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Versões e Recursos do OpenSSL no RHEL</text>

  <!-- RHEL 7 Column -->
  <rect x="30" y="55" width="220" height="400" rx="8" fill="#F5F5F5" stroke="#6C757D" stroke-width="2"/>
  <rect x="30" y="55" width="220" height="40" rx="8" fill="#6C757D"/>
  <text x="140" y="82" text-anchor="middle" class="section-title" fill="#fff">RHEL 7 (EOL 2024)</text>

  <rect x="50" y="110" width="180" height="35" rx="4" fill="#fff" stroke="#6C757D" stroke-width="1"/>
  <text x="140" y="132" text-anchor="middle" class="label">OpenSSL 1.0.2k</text>

  <text x="50" y="170" class="label">Suporte TLS:</text>
  <text x="60" y="188" class="small">✓ TLS 1.0</text>
  <text x="60" y="203" class="small">✓ TLS 1.1</text>
  <text x="60" y="218" class="small">✓ TLS 1.2</text>
  <text x="60" y="233" class="small">✗ TLS 1.3</text>

  <text x="50" y="260" class="label">Algoritmos Hash:</text>
  <text x="60" y="278" class="small">✓ SHA-1 (permitido)</text>
  <text x="60" y="293" class="small">✓ SHA-256</text>

  <text x="50" y="320" class="label">Requisitos de Chave:</text>
  <text x="60" y="338" class="small">RSA: Sem mínimo</text>
  <text x="60" y="353" class="small">⚠️ Chaves fracas possíveis</text>

  <text x="50" y="380" class="label">Configuração:</text>
  <text x="60" y="398" class="small">Apenas config manual</text>
  <text x="60" y="413" class="small">Sem crypto-policies</text>
  <text x="60" y="428" class="small">Gerenciador YUM</text>

  <!-- RHEL 8 Column -->
  <rect x="270" y="55" width="220" height="400" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <rect x="270" y="55" width="220" height="40" rx="8" fill="#388E3C"/>
  <text x="380" y="82" text-anchor="middle" class="section-title" fill="#fff">RHEL 8 (Ativo)</text>

  <rect x="290" y="110" width="180" height="35" rx="4" fill="#fff" stroke="#388E3C" stroke-width="1"/>
  <text x="380" y="132" text-anchor="middle" class="label">OpenSSL 1.1.1k</text>

  <text x="290" y="170" class="label">Suporte TLS:</text>
  <text x="300" y="188" class="small">✗ TLS 1.0 (DEFAULT bloqueia)</text>
  <text x="300" y="203" class="small">✗ TLS 1.1 (DEFAULT bloqueia)</text>
  <text x="300" y="218" class="small">✓ TLS 1.2 (padrão)</text>
  <text x="300" y="233" class="small">✓ TLS 1.3</text>

  <text x="290" y="260" class="label">Algoritmos Hash:</text>
  <text x="300" y="278" class="small">⚠️ SHA-1 (depreciado)</text>
  <text x="300" y="293" class="small">✓ SHA-256+</text>

  <text x="290" y="320" class="label">Requisitos de Chave:</text>
  <text x="300" y="338" class="small">RSA: 2048+ (DEFAULT)</text>
  <text x="300" y="353" class="small">ECC: P-256+</text>

  <text x="290" y="380" class="label">Configuração:</text>
  <text x="300" y="398" class="small">✓ Crypto-policies ⭐</text>
  <text x="300" y="413" class="small">✓ Segurança do sistema</text>
  <text x="300" y="428" class="small">Gerenciador DNF</text>

  <!-- RHEL 9 Column -->
  <rect x="510" y="55" width="220" height="400" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <rect x="510" y="55" width="220" height="40" rx="8" fill="#1976D2"/>
  <text x="620" y="82" text-anchor="middle" class="section-title" fill="#fff">RHEL 9 (Atual)</text>

  <rect x="530" y="110" width="180" height="35" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="620" y="132" text-anchor="middle" class="label">OpenSSL 3.0.7+</text>

  <text x="530" y="170" class="label">Suporte TLS:</text>
  <text x="540" y="188" class="small">✗ TLS 1.0 (bloqueado)</text>
  <text x="540" y="203" class="small">✗ TLS 1.1 (bloqueado)</text>
  <text x="540" y="218" class="small">✓ TLS 1.2</text>
  <text x="540" y="233" class="small">✓ TLS 1.3</text>

  <text x="530" y="260" class="label">Algoritmos Hash:</text>
  <text x="540" y="278" class="small" fill="#E53935">✗ SHA-1 bloqueado ⚠️</text>
  <text x="540" y="293" class="small">✓ Apenas SHA-256+</text>

  <text x="530" y="320" class="label">Requisitos de Chave:</text>
  <text x="540" y="338" class="small">RSA: 2048+ obrigatório</text>
  <text x="540" y="353" class="small">SANs: Obrigatórios ⭐</text>

  <text x="530" y="380" class="label">Configuração:</text>
  <text x="540" y="398" class="small">✓ Crypto-policies avançado</text>
  <text x="540" y="413" class="small">✓ Provider legacy</text>
  <text x="540" y="428" class="small">Validação mais rígida</text>

  <!-- RHEL 10 Column -->
  <rect x="750" y="55" width="220" height="400" rx="8" fill="#E0F7FA" stroke="#00ACC1" stroke-width="2"/>
  <rect x="750" y="55" width="220" height="40" rx="8" fill="#00ACC1"/>
  <text x="860" y="82" text-anchor="middle" class="section-title" fill="#fff">RHEL 10 (Mais Novo)</text>

  <rect x="770" y="110" width="180" height="35" rx="4" fill="#fff" stroke="#00ACC1" stroke-width="1"/>
  <text x="860" y="132" text-anchor="middle" class="label">OpenSSL 3.5.5</text>

  <text x="770" y="170" class="label">Suporte TLS:</text>
  <text x="780" y="188" class="small">✗ TLS 1.0/1.1 bloqueado</text>
  <text x="780" y="203" class="small">✓ TLS 1.2</text>
  <text x="780" y="218" class="small">✓ TLS 1.3 (preferido)</text>

  <text x="770" y="260" class="label">Algoritmos Hash:</text>
  <text x="780" y="278" class="small">✗ SHA-1 bloqueado</text>
  <text x="780" y="293" class="small">✓ Algoritmos modernos</text>

  <text x="770" y="320" class="label">Requisitos de Chave:</text>
  <text x="780" y="338" class="small">RSA: 2048+</text>
  <text x="780" y="353" class="small">Segurança aprimorada</text>

  <text x="770" y="380" class="label">Configuração:</text>
  <text x="780" y="398" class="small">✓ Crypto-policies melhorado</text>
  <text x="780" y="413" class="small">✓ Melhor suporte FIPS</text>
  <text x="780" y="428" class="small">Cripto preparada</text>

  <!-- Legend Section -->
  <rect x="30" y="480" width="940" height="100" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="500" y="505" text-anchor="middle" class="section-title">Legenda de Recursos</text>

  <rect x="60" y="520" width="15" height="15" fill="#D4EDDA" stroke="#388E3C"/>
  <text x="85" y="532" class="small">✓ Suportado/Habilitado</text>

  <rect x="230" y="520" width="15" height="15" fill="#FFF3CD" stroke="#F57C00"/>
  <text x="255" y="532" class="small">⚠️ Depreciado/Aviso</text>

  <rect x="430" y="520" width="15" height="15" fill="#FFEBEE" stroke="#E53935"/>
  <text x="455" y="532" class="small">✗ Bloqueado/Indisponível</text>

  <rect x="640" y="520" width="15" height="15" fill="#FFC107"/>
  <text x="665" y="532" class="small">⭐ Recurso Principal</text>

  <text x="60" y="560" class="small">Nota: Configurações padrão crypto-policy DEFAULT mostradas. Política LEGACY habilita protocolos antigos para compatibilidade.</text>

  <!-- Compatibility Warning -->
  <rect x="30" y="600" width="940" height="70" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1"/>
  <text x="500" y="625" text-anchor="middle" class="section-title" fill="#E53935">⚠️ Problema Crítico de Migração: RHEL 8 → RHEL 9</text>
  <text x="500" y="650" text-anchor="middle" class="small">Certificados SHA-1 que funcionavam no RHEL 8 FALHARÃO no RHEL 9. Atualize todos os certificados para SHA-256+ antes da migração.</text>
</svg>
