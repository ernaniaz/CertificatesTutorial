<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #333; }
      .arrow { stroke: #1976D2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#388E3C" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Arquitetura FIPS 140-2/140-3 no RHEL</text>

  <!-- Linux Kernel -->
  <rect x="400" y="55" width="200" height="45" rx="6" fill="#0066CC" stroke="#004C99" stroke-width="2"/>
  <text x="500" y="78" text-anchor="middle" class="label" fill="#fff">Kernel Linux</text>
  <text x="500" y="92" text-anchor="middle" class="small" fill="#fff">/proc/sys/crypto/fips_enabled</text>

  <!-- FIPS Flag Decision -->
  <path d="M 500 100 L 500 138" class="arrow"/>

  <polygon points="500,140 570,170 500,200 430,170" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="500" y="175" text-anchor="middle" class="small">FIPS?</text>

  <!-- Enabled Path (Left) -->
  <path d="M 430 170 L 250 170 L 250 223" class="arrow"/>
  <text x="340" y="160" class="small" fill="#388E3C">=1 (Habilitado)</text>

  <rect x="150" y="225" width="200" height="40" rx="4" fill="#388E3C" stroke="#2E7D32" stroke-width="2"/>
  <text x="250" y="250" text-anchor="middle" class="label" fill="#fff">FIPS Ativo</text>

  <!-- Disabled Path (Right) -->
  <path d="M 570 170 L 750 170 L 750 223" class="arrow"/>
  <text x="660" y="160" class="small" fill="#F57C00">=0 (Desabilitado)</text>

  <rect x="650" y="225" width="200" height="40" rx="4" fill="#BDBDBD" stroke="#9E9E9E" stroke-width="2"/>
  <text x="750" y="250" text-anchor="middle" class="label">Modo Padrão</text>

  <!-- Arrow from FIPS Enforcement to Modules -->
  <path d="M 250 265 L 250 298" stroke="#388E3C" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>

  <!-- Validated Modules Section -->
  <rect x="30" y="300" width="460" height="195" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="260" y="325" text-anchor="middle" class="section-title" fill="#1976D2">Módulos Criptográficos Validados FIPS</text>

  <!-- OpenSSL FIPS -->
  <rect x="50" y="345" width="130" height="50" rx="4" fill="#17A2B8" stroke="#138496" stroke-width="1.5"/>
  <text x="115" y="368" text-anchor="middle" class="label" fill="#fff">OpenSSL FIPS</text>
  <text x="115" y="385" text-anchor="middle" class="code" fill="#fff">Impl. validada</text>

  <!-- Kernel Crypto -->
  <rect x="195" y="345" width="130" height="50" rx="4" fill="#17A2B8" stroke="#138496" stroke-width="1.5"/>
  <text x="260" y="368" text-anchor="middle" class="label" fill="#fff">Crypto Kernel</text>
  <text x="260" y="385" text-anchor="middle" class="code" fill="#fff">AES-NI, etc.</text>

  <!-- NSS FIPS -->
  <rect x="340" y="345" width="130" height="50" rx="4" fill="#17A2B8" stroke="#138496" stroke-width="1.5"/>
  <text x="405" y="368" text-anchor="middle" class="label" fill="#fff">NSS FIPS</text>
  <text x="405" y="385" text-anchor="middle" class="code" fill="#fff">Libs Mozilla</text>

  <!-- Algorithms info inside modules section -->
  <rect x="50" y="410" width="200" height="75" rx="4" fill="#D4EDDA" stroke="#388E3C" stroke-width="1"/>
  <text x="150" y="430" text-anchor="middle" class="section-title" fill="#388E3C">FIPS-Aprovados</text>
  <text x="60" y="448" class="small" fill="#388E3C">✓ AES-128/192/256</text>
  <text x="60" y="463" class="small" fill="#388E3C">✓ SHA-256/384/512</text>
  <text x="60" y="478" class="small" fill="#388E3C">✓ RSA 2048+, ECDSA</text>

  <rect x="270" y="410" width="200" height="75" rx="4" fill="#FFEBEE" stroke="#E53935" stroke-width="1"/>
  <text x="370" y="430" text-anchor="middle" class="section-title" fill="#E53935">FIPS-Bloqueados</text>
  <text x="280" y="448" class="small" fill="#E53935">✗ MD5, assinaturas SHA-1</text>
  <text x="280" y="463" class="small" fill="#E53935">✗ DES, RC4, 3DES</text>
  <text x="280" y="478" class="small" fill="#E53935">✗ RSA &lt;2048</text>

  <!-- Application Integration Section (Right side, vertically aligned) -->
  <rect x="520" y="300" width="450" height="195" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="740" y="325" text-anchor="middle" class="section-title" fill="#F57C00">Integração de Aplicações</text>

  <rect x="530" y="345" width="130" height="140" rx="4" fill="#fff" stroke="#F57C00" stroke-width="1"/>
  <text x="595" y="365" text-anchor="middle" class="label" fill="#F57C00">Baseadas OpenSSL</text>
  <text x="540" y="385" class="small">• Apache httpd</text>
  <text x="540" y="400" class="small">• NGINX</text>
  <text x="540" y="415" class="small">• curl/wget</text>
  <text x="540" y="430" class="small">• OpenSSH</text>
  <text x="540" y="450" class="small" fill="#1976D2">→ OpenSSL FIPS</text>

  <rect x="680" y="345" width="130" height="140" rx="4" fill="#fff" stroke="#F57C00" stroke-width="1"/>
  <text x="745" y="365" text-anchor="middle" class="label" fill="#F57C00">Baseadas NSS</text>
  <text x="690" y="385" class="small">• Firefox</text>
  <text x="690" y="400" class="small">• Thunderbird</text>
  <text x="690" y="415" class="small">• certutil</text>
  <text x="690" y="450" class="small" fill="#1976D2">→ NSS FIPS</text>

  <rect x="830" y="345" width="130" height="140" rx="4" fill="#fff" stroke="#F57C00" stroke-width="1"/>
  <text x="895" y="365" text-anchor="middle" class="label" fill="#F57C00">Baseadas Kernel</text>
  <text x="840" y="385" class="small">• IPsec</text>
  <text x="840" y="400" class="small">• dm-crypt</text>
  <text x="840" y="415" class="small">• FS Criptografado</text>
  <text x="840" y="450" class="small" fill="#1976D2">→ Crypto Kernel</text>

  <!-- Arrow from Modules to Apps -->
  <path d="M 490 370 L 518 370" class="arrow"/>

  <!-- Crypto-Policies Section -->
  <rect x="30" y="520" width="300" height="120" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="180" y="545" text-anchor="middle" class="section-title" fill="#388E3C">Crypto-Policies: FIPS</text>
  <text x="50" y="570" class="code">update-crypto-policies --set FIPS</text>
  <text x="50" y="595" class="small">Aplica:</text>
  <text x="60" y="613" class="small">• Apenas algoritmos FIPS-aprovados</text>
  <text x="60" y="628" class="small">• Configuração consistente do sistema</text>

  <!-- Compliance Section -->
  <rect x="350" y="520" width="300" height="120" rx="6" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="500" y="545" text-anchor="middle" class="section-title" fill="#388E3C">Validação de Conformidade</text>
  <text x="370" y="570" class="small">NIST CMVP (Programa de Validação</text>
  <text x="370" y="588" class="small">de Módulos Criptográficos)</text>
  <text x="370" y="613" class="small" fill="#388E3C">✓ RHEL 8 Certificado (FIPS 140-2)</text>
  <text x="370" y="628" class="small" fill="#388E3C">✓ RHEL 9 Certificado (FIPS 140-3)</text>

  <!-- Standard Mode Info -->
  <rect x="670" y="520" width="300" height="120" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="2"/>
  <text x="820" y="545" text-anchor="middle" class="section-title">Modo Padrão (Não-FIPS)</text>
  <text x="690" y="570" class="small">Todos os algoritmos disponíveis:</text>
  <text x="700" y="588" class="small">• Suporte legacy (MD5, SHA-1)</text>
  <text x="700" y="606" class="small">• Maior compatibilidade</text>
  <text x="700" y="624" class="small">• Opções de desempenho</text>

  <!-- Arrow from Standard Mode to info -->
  <path d="M 850 245 L 999 245 L 999 580 L 970 580" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>

  <!-- Legend -->
  <rect x="30" y="660" width="940" height="60" rx="4" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="500" y="685" text-anchor="middle" class="section-title">Comandos do Modo FIPS</text>
  <text x="60" y="707" class="small">Habilitar: fips-mode-setup --enable (reinício necessário)</text>
  <text x="380" y="707" class="small">Verificar: cat /proc/sys/crypto/fips_enabled (1=habilitado)</text>
  <text x="720" y="707" class="small">Checar: fips-mode-setup --check</text>

  <!-- Arrows showing flow from FIPS to policies -->
  <path d="M 260 495 L 260 520" stroke="#388E3C" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-green)"/>
</svg>
