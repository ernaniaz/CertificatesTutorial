<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 760" width="1340" height="760">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
      .arrow-blue { stroke: #1976D2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-blue); }
      .arrow-orange { stroke: #F57C00; stroke-width: 2.5; fill: none; marker-end: url(#arrow-orange); }
      .arrow-green { stroke: #388E3C; stroke-width: 2.5; fill: none; marker-end: url(#arrow-green); }
      .arrow-red { stroke: #D32F2F; stroke-width: 2.5; fill: none; marker-end: url(#arrow-red); }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F57C00"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#388E3C"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#D32F2F"/>
    </marker>
  </defs>

  <text x="670" y="32" text-anchor="middle" class="title">Fluxo de Assinatura de Módulo de Kernel Personalizado no RHEL</text>

  <rect x="20" y="50" width="1300" height="340" rx="10" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>

  <rect x="40" y="90" width="220" height="130" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="150" y="115" text-anchor="middle" class="section-title" fill="#1976D2">1. Criar Par de Chaves</text>
  <text x="46" y="145" class="code">efikeygen --dbdir /etc/pki/pesign</text>
  <text x="46" y="165" class="small">Criar identidade de assinatura Secure Boot</text>
  <text x="46" y="185" class="small">Usar perfil de módulo p/ assinatura de módulos</text>

  <rect x="300" y="90" width="240" height="130" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="420" y="115" text-anchor="middle" class="section-title" fill="#388E3C">2. Exportar Material</text>
  <text x="315" y="145" class="code">certutil ... &gt; sb_cert.cer</text>
  <text x="315" y="164" class="code">pk12util -o sb_cert.p12</text>
  <text x="315" y="183" class="code">openssl pkcs12 ... -out sb_cert.priv</text>
  <text x="315" y="203" class="small">Extração da chave privada é o passo arriscado</text>

  <rect x="580" y="90" width="240" height="130" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="700" y="115" text-anchor="middle" class="section-title" fill="#F57C00">3. Inscrever Certificado Público</text>
  <text x="595" y="145" class="code">mokutil --import sb_cert.cer</text>
  <text x="595" y="165" class="small">Reiniciar, concluir inscrição no MokManager</text>
  <text x="595" y="185" class="small">Chave entra na confiança de plat. no próx. boot</text>

  <rect x="860" y="90" width="250" height="130" rx="8" fill="#EDE7F6" stroke="#5E35B1" stroke-width="2"/>
  <text x="985" y="115" text-anchor="middle" class="section-title" fill="#5E35B1">4. Assinar Arquivo de Módulo</text>
  <text x="875" y="145" class="code">/usr/src/kernels/$(uname -r)/</text>
  <text x="875" y="164" class="code">scripts/sign-file sha256</text>
  <text x="875" y="183" class="code">sb_cert.priv sb_cert.cer my_module.ko</text>
  <text x="875" y="203" class="small">Assinatura é adicionada ao arquivo .ko</text>

  <rect x="1150" y="90" width="150" height="130" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
  <text x="1225" y="115" text-anchor="middle" class="section-title" fill="#F9A825">5. Carregar</text>
  <text x="1165" y="145" class="code">modinfo ...</text>
  <text x="1165" y="164" class="code">cp .../extra/</text>
  <text x="1165" y="183" class="code">depmod + modprobe</text>
  <text x="1165" y="203" class="small">Verificar assinante primeiro</text>

  <path d="M 260 155 L 300 155" class="arrow-blue"/>
  <path d="M 540 155 L 580 155" class="arrow-green"/>
  <path d="M 820 155 L 860 155" class="arrow-orange"/>
  <path d="M 1110 155 L 1150 155" class="arrow-blue"/>

  <rect x="100" y="260" width="1140" height="95" rx="8" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="670" y="285" text-anchor="middle" class="section-title">Regra de Verificação no Kernel em Execução</text>
  <text x="140" y="315" class="small">Kernel verifica assinaturas de módulos contra</text>
  <text x="350" y="315" class="code">.builtin_trusted_keys</text>
  <text x="510" y="315" class="small">e</text>
  <text x="545" y="315" class="code">.platform</text>
  <text x="625" y="315" class="small">, enquanto entradas revogadas em</text>
  <text x="795" y="315" class="code">.blacklist</text>
  <text x="885" y="315" class="small">ainda negam carregamento.</text>

  <rect x="20" y="420" width="400" height="250" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="220" y="445" text-anchor="middle" class="section-title" fill="#1976D2">Ferramentas RHEL Suportadas</text>
  <text x="40" y="475" class="code">pesign</text>
  <text x="120" y="475" class="small">assinatura / inspeção de binários EFI</text>
  <text x="40" y="500" class="code">efikeygen</text>
  <text x="120" y="500" class="small">criar identidade de assinatura</text>
  <text x="40" y="525" class="code">mokutil</text>
  <text x="120" y="525" class="small">inscrição MOK</text>
  <text x="40" y="550" class="code">keyctl</text>
  <text x="120" y="550" class="small">inspecionar keyrings</text>
  <text x="40" y="575" class="code">sign-file</text>
  <text x="120" y="575" class="small">adicionar assinatura ao módulo</text>
  <text x="40" y="600" class="code">modinfo</text>
  <text x="120" y="600" class="small">verificar metadados do assinante</text>

  <rect x="460" y="420" width="410" height="250" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="665" y="445" text-anchor="middle" class="section-title" fill="#D32F2F">Pontos de Falha Comuns</text>
  <text x="480" y="475" class="small">- Módulo assinado, mas certificado público nunca inscrito</text>
  <text x="480" y="500" class="small">- Reinicialização ocorreu, mas MokManager foi ignorado</text>
  <text x="480" y="525" class="small">- Assinante está em uma lista de revogação</text>
  <text x="480" y="550" class="small">- Árvore de kernel errada usada para caminho do sign-file</text>
  <text x="480" y="575" class="small">- Validade ou ciclo de vida da chave privada ignorados</text>
  <text x="480" y="600" class="small">- Administrador confunde repositório TLS com confiança Secure Boot</text>

  <rect x="910" y="420" width="410" height="250" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="1115" y="445" text-anchor="middle" class="section-title" fill="#388E3C">Resultado Operacional</text>
  <text x="930" y="475" class="small">Se o assinante é confiável e não revogado:</text>
  <text x="930" y="500" class="small">- Módulo pode carregar em hosts com Secure Boot</text>
  <text x="930" y="525" class="small">- Mesmo módulo assinado também funciona em hosts sem Secure Boot</text>
  <text x="930" y="555" class="small">Se o assinante não é confiável:</text>
  <text x="930" y="580" class="small">- Carregamento é negado</text>
  <text x="930" y="605" class="small">- Log do kernel se torna sua fonte primária de evidência</text>

  <path d="M 670 355 L 670 415" class="arrow-red"/>
  <text x="685" y="388" class="small" fill="#D32F2F">decisão de confiança</text>
</svg>
