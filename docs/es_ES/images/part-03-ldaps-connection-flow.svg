<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #333; }
      .arrow { stroke: #1976D2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-back { stroke: #388E3C; stroke-width: 2; fill: none; marker-end: url(#arrowhead-green); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#388E3C" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Flujo de Conexión LDAPS (Puerto 636)</text>

  <!-- Participants -->
  <rect x="50" y="50" width="120" height="40" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="110" y="75" text-anchor="middle" class="label">Cliente LDAP</text>

  <rect x="250" y="50" width="150" height="40" rx="6" fill="#7B1FA2" stroke="#6A1B9A" stroke-width="2"/>
  <text x="325" y="75" text-anchor="middle" class="label" fill="#fff">Servidor OpenLDAP</text>

  <rect x="500" y="50" width="140" height="40" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="570" y="75" text-anchor="middle" class="label">Certificado TLS</text>

  <rect x="740" y="50" width="140" height="40" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="810" y="75" text-anchor="middle" class="label">Clave Privada</text>

  <!-- Lifelines -->
  <line x1="110" y1="90" x2="110" y2="500" stroke="#1976D2" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="325" y1="90" x2="325" y2="500" stroke="#7B1FA2" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="570" y1="90" x2="570" y2="280" stroke="#388E3C" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="810" y1="90" x2="810" y2="280" stroke="#E53935" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Step 1: Connect -->
  <path d="M 115 115 L 315 115" class="arrow"/>
  <text x="215" y="110" text-anchor="middle" class="small">1. Conectar a ldaps://server:636</text>

  <!-- Step 2-4: Load certs -->
  <path d="M 335 145 L 560 145" class="arrow"/>
  <text x="448" y="140" text-anchor="middle" class="small">2. Cargar certificado (cn=config)</text>

  <path d="M 335 175 L 800 175" class="arrow"/>
  <text x="568" y="170" text-anchor="middle" class="small">3. Cargar clave privada (¡contexto de SELinux!)</text>

  <rect x="480" y="195" width="160" height="40" rx="4" fill="#FFF3E0" stroke="#F57C00" stroke-width="1"/>
  <text x="560" y="212" text-anchor="middle" class="small">4. Cargar certificado de CA</text>
  <text x="560" y="228" text-anchor="middle" class="code">olcTLSCACertificateFile</text>

  <!-- Step 5: TLS Handshake -->
  <path d="M 315 260 L 115 260" class="arrow-back"/>
  <text x="215" y="255" text-anchor="middle" class="small">5. Handshake TLS: enviar certificado</text>

  <!-- Step 6: Validate -->
  <rect x="60" y="275" width="100" height="30" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="110" y="295" text-anchor="middle" class="small">6. Validar certificado</text>

  <!-- Encrypted LDAP Session -->
  <rect x="30" y="320" width="450" height="175" rx="6" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="255" y="345" text-anchor="middle" class="section-title" fill="#388E3C">Sesión LDAP cifrada</text>

  <path d="M 115 370 L 315 370" class="arrow"/>
  <text x="215" y="365" text-anchor="middle" class="small">✓ TLS establecido</text>

  <path d="M 115 400 L 315 400" class="arrow"/>
  <text x="215" y="395" text-anchor="middle" class="code">BIND dn=cn=admin,dc=example,dc=com</text>

  <path d="M 315 420 L 115 420" class="arrow-back"/>
  <text x="215" y="435" text-anchor="middle" class="code">BIND correcto</text>

  <path d="M 115 455 L 315 455" class="arrow"/>
  <text x="215" y="450" text-anchor="middle" class="code">SEARCH base=dc=example,dc=com</text>

  <path d="M 315 475 L 115 475" class="arrow-back"/>
  <text x="215" y="490" text-anchor="middle" class="code">Resultados de búsqueda (cifrados)</text>

  <!-- Client Certificate Auth (Optional) -->
  <rect x="500" y="320" width="470" height="100" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="735" y="345" text-anchor="middle" class="section-title" fill="#1976D2">Opcional: autenticación con certificado de cliente</text>
  <text x="520" y="370" class="small">• El servidor puede solicitar un certificado de cliente</text>
  <text x="520" y="390" class="small">• El cliente envía su certificado</text>
  <text x="520" y="410" class="small">• El servidor lo verifica con la CA</text>

  <!-- Configuration -->
  <rect x="30" y="520" width="940" height="160" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="500" y="545" text-anchor="middle" class="section-title">Configuración TLS de OpenLDAP</text>

  <rect x="50" y="560" width="420" height="100" rx="4" fill="#fff" stroke="#7B1FA2" stroke-width="1"/>
  <text x="260" y="580" text-anchor="middle" class="label" fill="#7B1FA2">Servidor (cn=config)</text>
  <text x="70" y="600" class="code">olcTLSCertificateFile: /etc/pki/tls/certs/ldap.crt</text>
  <text x="70" y="618" class="code">olcTLSCertificateKeyFile: /etc/pki/tls/private/ldap.key</text>
  <text x="70" y="636" class="code">olcTLSCACertificateFile: /etc/pki/tls/certs/ca.crt</text>
  <text x="70" y="654" class="code">olcTLSVerifyClient: never/allow/try/demand</text>

  <rect x="490" y="560" width="460" height="100" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="720" y="580" text-anchor="middle" class="label" fill="#1976D2">Cliente (/etc/openldap/ldap.conf)</text>
  <text x="510" y="600" class="code">TLS_CACERT /etc/pki/tls/certs/ca-bundle.crt</text>
  <text x="510" y="618" class="code">TLS_REQCERT demand   # or never/allow/try</text>
  <text x="510" y="636" class="code">URI ldaps://ldap.example.com:636</text>
  <text x="510" y="654" class="code">BASE dc=example,dc=com</text>
</svg>
