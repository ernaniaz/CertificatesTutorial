<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 760" width="1320" height="760">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
      .arrow-blue { stroke: #1976D2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-blue); }
      .arrow-green { stroke: #388E3C; stroke-width: 2.5; fill: none; marker-end: url(#arrow-green); }
      .arrow-orange { stroke: #F57C00; stroke-width: 2.5; fill: none; marker-end: url(#arrow-orange); }
      .arrow-red { stroke: #D32F2F; stroke-width: 2.5; fill: none; marker-end: url(#arrow-red); }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#388E3C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F57C00"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#D32F2F"/>
    </marker>
  </defs>

  <text x="660" y="32" text-anchor="middle" class="title">Cadena de Confianza de Secure Boot en RHEL</text>

  <rect x="20" y="50" width="1280" height="430" rx="10" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>

  <rect x="40" y="85" width="220" height="150" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="150" y="110" text-anchor="middle" class="section-title" fill="#1976D2">1. Firmware UEFI</text>
  <text x="55" y="135" class="small">Valida ejecutables EFI antes de ejecutar</text>
  <text x="55" y="155" class="label">Bases de datos de confianza:</text>
  <text x="65" y="175" class="code">PK</text>
  <text x="95" y="175" class="small">propietario de plataforma</text>
  <text x="65" y="192" class="code">KEK</text>
  <text x="95" y="192" class="small">actualizaciones de db / dbx</text>
  <text x="65" y="209" class="code">db</text>
  <text x="95" y="209" class="small">certificados / hashes permitidos</text>

  <rect x="40" y="275" width="220" height="95" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="150" y="300" text-anchor="middle" class="section-title" fill="#D32F2F">Revocación</text>
  <text x="55" y="320" class="code">dbx</text>
  <text x="85" y="320" class="small">certificados / hashes revocados</text>
  <text x="55" y="340" class="small">Confiable pero revocado aún falla</text>

  <rect x="300" y="85" width="220" height="150" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="410" y="110" text-anchor="middle" class="section-title" fill="#388E3C">2. shim</text>
  <text x="315" y="135" class="small">Cargador de primera etapa aceptado por firmware</text>
  <text x="315" y="155" class="small">Puente entre confianza de firmware y confianza Red Hat</text>
  <text x="315" y="180" class="label">Contiene clave embebida:</text>
  <text x="315" y="200" class="small">Red Hat Secure Boot CA</text>

  <rect x="560" y="85" width="230" height="150" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="675" y="110" text-anchor="middle" class="section-title" fill="#F57C00">3. Binario EFI de GRUB</text>
  <text x="575" y="140" class="small">Validado por shim</text>
  <text x="575" y="160" class="small">Carga menú de arranque y kernel</text>
  <text x="575" y="185" class="small">Módulos GRUB arbitrarios no son el modelo</text>
  <text x="575" y="202" class="small">de seguridad en sistemas Secure Boot</text>

  <rect x="830" y="85" width="230" height="150" rx="8" fill="#EDE7F6" stroke="#5E35B1" stroke-width="2"/>
  <text x="945" y="110" text-anchor="middle" class="section-title" fill="#5E35B1">4. Kernel Linux</text>
  <text x="845" y="140" class="small">Validado antes de la ejecución</text>
  <text x="845" y="160" class="small">Contiene material de claves X.509 confiable</text>
  <text x="845" y="180" class="small">Impone verificación de módulos</text>
  <text x="845" y="200" class="small">Activa comportamiento de bloqueo en RHEL</text>

  <rect x="1100" y="85" width="180" height="150" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
  <text x="1190" y="110" text-anchor="middle" class="section-title" fill="#F9A825">5. Módulos</text>
  <text x="1115" y="140" class="small">Carga solo si la firma es confiable</text>
  <text x="1115" y="157" class="small">por los keyrings del kernel</text>
  <text x="1115" y="182" class="small">Módulos sin firmar o revocados</text>
  <text x="1115" y="199" class="small">son rechazados</text>

  <path d="M 260 160 L 300 160" class="arrow-blue"/>
  <path d="M 520 160 L 560 160" class="arrow-green"/>
  <path d="M 790 160 L 830 160" class="arrow-orange"/>
  <path d="M 1060 160 L 1100 160" class="arrow-blue"/>

  <path d="M 150 275 L 150 235" class="arrow-red"/>
  <text x="175" y="257" class="small" fill="#D32F2F">denegado si coincide en dbx</text>

  <rect x="120" y="390" width="1080" height="75" rx="8" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="660" y="415" text-anchor="middle" class="section-title">Ruta de Autorización</text>
  <text x="150" y="438" class="small">Firmware acepta</text>
  <text x="255" y="438" class="code">shim</text>
  <text x="305" y="438" class="small">usando confianza de firmware, luego</text>
  <text x="480" y="438" class="code">shim</text>
  <text x="520" y="438" class="small">acepta</text>
  <text x="575" y="438" class="code">GRUB</text>
  <text x="620" y="438" class="small">y el</text>
  <text x="675" y="438" class="code">kernel</text>
  <text x="735" y="438" class="small">, luego el</text>
  <text x="815" y="438" class="code">kernel</text>
  <text x="875" y="438" class="small">acepta módulos.</text>

  <rect x="20" y="510" width="410" height="190" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="225" y="535" text-anchor="middle" class="section-title" fill="#1976D2">Fuentes de Confianza Visibles en RHEL en Ejecución</text>
  <text x="40" y="565" class="small">1. Bases de datos de firmware</text>
  <text x="40" y="585" class="small">2. Certificado embebido de shim</text>
  <text x="40" y="605" class="small">3. Certificados de propietario inscritos en MOK</text>
  <text x="40" y="630" class="small">Estos aparecen a través de keyrings como</text>
  <text x="40" y="652" class="code">.builtin_trusted_keys</text>
  <text x="200" y="652" class="small">y</text>
  <text x="232" y="652" class="code">.platform</text>

  <rect x="455" y="510" width="390" height="190" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="650" y="535" text-anchor="middle" class="section-title" fill="#388E3C">Lo que Secure Boot Hace Bien</text>
  <text x="475" y="565" class="small">- Bloquear binarios EFI no autorizados</text>
  <text x="475" y="585" class="small">- Prevenir la carga de módulos de kernel sin firmar</text>
  <text x="475" y="605" class="small">- Extender la confianza del firmware al espacio del kernel</text>
  <text x="475" y="625" class="small">- Soportar flujos de lockdown y arranque medido</text>

  <rect x="870" y="510" width="430" height="190" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="1085" y="535" text-anchor="middle" class="section-title" fill="#F57C00">Lo que No Hace Automáticamente</text>
  <text x="890" y="565" class="small">- Proteger todos los archivos de espacio de usuario</text>
  <text x="890" y="585" class="small">- Reemplazar almacenes de confianza TLS</text>
  <text x="890" y="605" class="small">- Cifrar discos o secretos por sí mismo</text>
  <text x="890" y="625" class="small">- Hacer seguro el código firmado pero vulnerable</text>
  <text x="890" y="645" class="small">- Eliminar la necesidad de planificación de revocación</text>
</svg>
