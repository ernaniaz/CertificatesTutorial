<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="1000" height="650">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #333; }
      .arrow { stroke: #1976D2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-back { stroke: #388E3C; stroke-width: 2; fill: none; marker-end: url(#arrowhead-green); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#388E3C" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Flujo de Conexión HTTPS/HTTP2 de NGINX</text>

  <!-- Participants -->
  <rect x="50" y="50" width="120" height="40" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="110" y="75" text-anchor="middle" class="label">Navegador Web</text>

  <rect x="250" y="50" width="140" height="40" rx="6" fill="#388E3C" stroke="#2E7D32" stroke-width="2"/>
  <text x="320" y="75" text-anchor="middle" class="label" fill="#fff">Servidor NGINX</text>

  <rect x="480" y="50" width="160" height="40" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="560" y="75" text-anchor="middle" class="label">Certificado</text>

  <rect x="720" y="50" width="160" height="40" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="800" y="75" text-anchor="middle" class="label">Clave Privada</text>

  <!-- Lifelines -->
  <line x1="110" y1="90" x2="110" y2="480" stroke="#1976D2" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="320" y1="90" x2="320" y2="480" stroke="#388E3C" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="560" y1="90" x2="560" y2="270" stroke="#388E3C" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="800" y1="90" x2="800" y2="270" stroke="#E53935" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Step 1: HTTPS Request -->
  <path d="M 115 120 L 310 120" class="arrow"/>
  <text x="213" y="115" text-anchor="middle" class="small">1. Solicitud HTTPS</text>

  <!-- Step 2: Check server block -->
  <rect x="280" y="135" width="80" height="30" rx="3" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
  <text x="320" y="152" text-anchor="middle" class="code">listen 443</text>
  <text x="320" y="162" text-anchor="middle" class="code">ssl http2</text>

  <!-- Step 3: Load Certificate -->
  <path d="M 330 175 L 550 175" class="arrow"/>
  <text x="440" y="170" text-anchor="middle" class="small">3. ssl_certificate</text>
  <path d="M 550 195 L 330 195" class="arrow-back"/>

  <!-- Step 4: Load Private Key -->
  <path d="M 330 220 L 790 220" class="arrow"/>
  <text x="560" y="215" text-anchor="middle" class="small">4. ssl_certificate_key</text>
  <path d="M 790 240 L 330 240" class="arrow-back"/>
  <text x="560" y="255" text-anchor="middle" class="code">(modo 600 obligatorio)</text>

  <!-- Step 5: TLS Handshake -->
  <path d="M 310 280 L 115 280" class="arrow-back"/>
  <text x="220" y="275" text-anchor="middle" class="small">5. TLS Handshake - Enviar Certificado</text>

  <!-- Step 6: Validate -->
  <rect x="60" y="295" width="100" height="30" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="110" y="315" text-anchor="middle" class="small">6. Validar Cert</text>

  <!-- HTTP/2 Negotiation -->
  <rect x="30" y="340" width="580" height="130" rx="6" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="320" y="365" text-anchor="middle" class="section-title" fill="#388E3C">Negociación HTTP/2 (vía ALPN)</text>

  <path d="M 115 385 L 310 385" class="arrow"/>
  <text x="213" y="380" text-anchor="middle" class="small">✓ TLS Establecido</text>

  <path d="M 310 400 L 115 400" class="arrow-back"/>
  <text x="213" y="415" text-anchor="middle" class="small">Soporte HTTP/2 Anunciado (h2)</text>

  <path d="M 115 425 L 310 425" class="arrow"/>
  <text x="213" y="440" text-anchor="middle" class="small">Solicitudes Multiplexadas (conexión única)</text>

  <path d="M 310 450 L 115 450" class="arrow-back"/>
  <text x="213" y="465" text-anchor="middle" class="small">Respuestas Multiplexadas</text>

  <!-- Invalid Path -->
  <rect x="630" y="280" width="340" height="100" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="800" y="305" text-anchor="middle" class="section-title" fill="#E53935">Certificado Inválido</text>
  <text x="650" y="330" class="small">✗ Conexión Abortada</text>
  <text x="650" y="350" class="code">• Certificado expirado</text>
  <text x="650" y="362" class="code">• Hostname no coincide</text>
  <text x="650" y="374" class="code">• CA no confiable</text>

  <!-- NGINX Configuration -->
  <rect x="30" y="500" width="940" height="130" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="500" y="525" text-anchor="middle" class="section-title">Configuración SSL de NGINX</text>

  <text x="60" y="555" class="code">server {</text>
  <text x="80" y="572" class="code">listen 443 ssl http2;</text>
  <text x="80" y="589" class="code">server_name ejemplo.com;</text>
  <text x="350" y="555" class="code">ssl_certificate /etc/pki/tls/certs/server.crt;</text>
  <text x="350" y="572" class="code">ssl_certificate_key /etc/pki/tls/private/server.key;</text>
  <text x="350" y="589" class="code">ssl_protocols TLSv1.2 TLSv1.3;</text>
  <text x="700" y="555" class="code">ssl_prefer_server_ciphers on;</text>
  <text x="700" y="572" class="code">add_header Strict-Transport-Security</text>
  <text x="710" y="589" class="code">"max-age=31536000" always;</text>
  <text x="60" y="615" class="code">}</text>
</svg>
