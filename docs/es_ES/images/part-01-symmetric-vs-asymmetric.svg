<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke: #999; stroke-width: 1.5; stroke-dasharray: 5,3; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" class="title">Cifrado Simétrico vs Asimétrico</text>

  <!-- Symmetric Encryption Section -->
  <rect x="30" y="60" width="450" height="200" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="255" y="85" text-anchor="middle" class="section-title">Cifrado Simétrico</text>

  <!-- Alice -->
  <rect x="60" y="110" width="60" height="40" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1.5"/>
  <text x="90" y="135" text-anchor="middle" class="label">Alicia</text>

  <!-- Shared Key (center) -->
  <rect x="200" y="110" width="110" height="40" rx="4" fill="#FFC107" stroke="#F57C00" stroke-width="1.5"/>
  <text x="255" y="128" text-anchor="middle" class="label">Clave Secreta</text>
  <text x="255" y="142" text-anchor="middle" class="label">Compartida</text>

  <!-- Bob -->
  <rect x="390" y="110" width="60" height="40" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1.5"/>
  <text x="420" y="135" text-anchor="middle" class="label">Roberto</text>

  <!-- Arrows -->
  <path d="M 120 130 L 198 130" class="arrow"/>
  <text x="155" y="122" text-anchor="middle" class="small">Cifra</text>

  <path d="M 310 130 L 388 130" class="arrow"/>
  <text x="350" y="122" text-anchor="middle" class="small">Mensaje</text>

  <!-- Same key indicator -->
  <path d="M 255 150 Q 255 180 255 150" class="dashed"/>
  <ellipse cx="255" cy="180" rx="50" ry="15" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="255" y="185" text-anchor="middle" class="small">Misma Clave</text>

  <!-- Symmetric features -->
  <text x="255" y="230" text-anchor="middle" class="small">✓ Rápido  ✓ Eficiente  ✗ Problema distribución clave</text>

  <!-- Asymmetric Encryption Section -->
  <rect x="520" y="60" width="450" height="200" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="745" y="85" text-anchor="middle" class="section-title">Cifrado Asimétrico</text>

  <!-- Alice -->
  <rect x="550" y="110" width="60" height="40" rx="4" fill="#fff" stroke="#388E3C" stroke-width="1.5"/>
  <text x="580" y="135" text-anchor="middle" class="label">Alicia</text>

  <!-- Public Key -->
  <rect x="680" y="100" width="100" height="30" rx="4" fill="#388E3C" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="730" y="120" text-anchor="middle" class="label" fill="#fff">Clave Pública</text>

  <!-- Private Key -->
  <rect x="680" y="140" width="100" height="30" rx="4" fill="#E53935" stroke="#C62828" stroke-width="1.5"/>
  <text x="730" y="160" text-anchor="middle" class="label" fill="#fff">Clave Privada</text>

  <!-- Bob -->
  <rect x="860" y="110" width="60" height="40" rx="4" fill="#fff" stroke="#388E3C" stroke-width="1.5"/>
  <text x="890" y="135" text-anchor="middle" class="label">Roberto</text>

  <!-- Arrows -->
  <path d="M 610 125 L 678 115" class="arrow"/>
  <text x="644" y="110" text-anchor="middle" class="small">Cifra</text>

  <path d="M 780 130 L 858 130" class="arrow"/>
  <text x="820" y="122" text-anchor="middle" class="small">Mensaje</text>

  <!-- Different keys indicator -->
  <path d="M 730 135 L 730 135" class="dashed"/>
  <text x="730" y="195" text-anchor="middle" class="small">Claves Diferentes</text>
  <path d="M 700 175 L 760 175" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Asymmetric features -->
  <text x="745" y="230" text-anchor="middle" class="small">✓ Intercambio seguro claves  ✓ Sin secreto previo  ✗ Más lento</text>

  <!-- Comparison Section -->
  <rect x="30" y="290" width="940" height="280" rx="8" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="2"/>
  <text x="500" y="320" text-anchor="middle" class="section-title">Resumen Comparativo</text>

  <!-- Symmetric Box -->
  <rect x="60" y="340" width="400" height="200" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="260" y="370" text-anchor="middle" class="section-title" fill="#1976D2">Simétrico</text>
  <line x1="100" y1="385" x2="420" y2="385" stroke="#1976D2" stroke-width="1"/>

  <text x="80" y="410" class="label">Ejemplos de Algoritmos:</text>
  <text x="100" y="430" class="code">AES-128, AES-256, ChaCha20</text>

  <text x="80" y="460" class="label">Tamaño de Clave:</text>
  <text x="100" y="480" class="small">128-256 bits típico</text>

  <text x="80" y="510" class="label">Caso de Uso:</text>
  <text x="100" y="530" class="small">Cifrado masivo de datos, cifrado de disco</text>

  <!-- Asymmetric Box -->
  <rect x="540" y="340" width="400" height="200" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="740" y="370" text-anchor="middle" class="section-title" fill="#388E3C">Asimétrico</text>
  <line x1="580" y1="385" x2="900" y2="385" stroke="#388E3C" stroke-width="1"/>

  <text x="560" y="410" class="label">Ejemplos de Algoritmos:</text>
  <text x="580" y="430" class="code">RSA, ECDSA, Ed25519</text>

  <text x="560" y="460" class="label">Tamaño de Clave:</text>
  <text x="580" y="480" class="small">2048-4096 bits (RSA), 256 bits (ECC)</text>

  <text x="560" y="510" class="label">Caso de Uso:</text>
  <text x="580" y="530" class="small">Intercambio claves, firmas digitales, TLS</text>
</svg>
