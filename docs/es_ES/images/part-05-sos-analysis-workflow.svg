<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 780" width="1000" height="780">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #333; }
      .arrow { stroke: #1976D2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Flujo de Análisis de Certificados del SOS Report</text>

  <!-- Left column: Steps 1-3 -->
  <!-- Step 1: Extract -->
  <ellipse cx="100" cy="80" rx="80" ry="28" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="100" y="78" text-anchor="middle" class="small">SOS Report</text>
  <text x="100" y="92" text-anchor="middle" class="small">Recibido</text>

  <path d="M 100 108 L 100 135" class="arrow"/>

  <rect x="30" y="140" width="140" height="50" rx="6" fill="#1976D2" stroke="#0D47A1" stroke-width="2"/>
  <text x="100" y="163" text-anchor="middle" class="label" fill="#fff">1. Extraer</text>
  <text x="100" y="178" text-anchor="middle" class="code" fill="#fff">tar xvf *.tar.xz</text>

  <path d="M 100 190 L 100 215" class="arrow"/>

  <!-- Step 2: Review -->
  <rect x="30" y="220" width="140" height="50" rx="6" fill="#1976D2" stroke="#0D47A1" stroke-width="2"/>
  <text x="100" y="243" text-anchor="middle" class="label" fill="#fff">2. Revisar</text>
  <text x="100" y="258" text-anchor="middle" class="code" fill="#fff">manifest.json</text>

  <path d="M 100 270 L 100 295" class="arrow"/>

  <!-- Step 3: Focus Areas -->
  <rect x="30" y="300" width="140" height="40" rx="6" fill="#1976D2" stroke="#0D47A1" stroke-width="2"/>
  <text x="100" y="325" text-anchor="middle" class="label" fill="#fff">3. Enfoque: Certs</text>

  <!-- Arrow from Step 3 to Analysis Container -->
  <path d="M 170 320 L 195 320" class="arrow"/>

  <!-- Analysis Container Box -->
  <rect x="200" y="55" width="530" height="310" rx="8" fill="#FAFAFA" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="465" y="78" text-anchor="middle" class="section-title">Áreas de Análisis</text>

  <!-- Certificados Box (inside container) -->
  <rect x="215" y="90" width="245" height="125" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="337" y="112" text-anchor="middle" class="section-title" fill="#388E3C">Archivos de Certificado</text>
  <text x="225" y="132" class="code">Verificar: etc/pki/</text>
  <text x="235" y="150" class="small">• ls-lR permisos</text>
  <text x="235" y="165" class="small">• Encontrar .crt .key .pem</text>
  <text x="235" y="180" class="small">• Verificar fechas expiración</text>
  <rect x="225" y="190" width="220" height="15" rx="2" fill="#FFEBEE" stroke="#E53935"/>
  <text x="335" y="202" text-anchor="middle" class="code" fill="#E53935">→ ¿Expirado? ¿Faltante?</text>

  <!-- Logs Box (inside container) -->
  <rect x="470" y="90" width="245" height="125" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="592" y="112" text-anchor="middle" class="section-title" fill="#1976D2">Logs del Sistema</text>
  <text x="480" y="132" class="code">Verificar:</text>
  <text x="490" y="150" class="small">• var/log/messages</text>
  <text x="490" y="165" class="small">• Salida journalctl</text>
  <text x="490" y="180" class="small">Buscar: SSL, TLS, cert</text>
  <rect x="480" y="190" width="220" height="15" rx="2" fill="#FFEBEE" stroke="#E53935"/>
  <text x="590" y="202" text-anchor="middle" class="code" fill="#E53935">→ ¿Errores cert? ¿AVC?</text>

  <!-- Configs Box (inside container) -->
  <rect x="215" y="225" width="245" height="125" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="337" y="247" text-anchor="middle" class="section-title" fill="#F57C00">Configs de Servicio</text>
  <text x="225" y="267" class="code">Verificar:</text>
  <text x="235" y="285" class="small">• etc/httpd/conf.d/</text>
  <text x="235" y="300" class="small">• etc/nginx/</text>
  <text x="235" y="315" class="small">• Configuración SSL/TLS</text>
  <rect x="225" y="325" width="220" height="15" rx="2" fill="#FFF3CD" stroke="#F57C00"/>
  <text x="335" y="337" text-anchor="middle" class="code" fill="#F57C00">→ ¿Rutas incorrectas?</text>

  <!-- System State Box (inside container) -->
  <rect x="470" y="225" width="245" height="125" rx="6" fill="#E0F7FA" stroke="#00ACC1" stroke-width="1.5"/>
  <text x="592" y="247" text-anchor="middle" class="section-title" fill="#00ACC1">Estado del Sistema</text>
  <text x="480" y="267" class="code">Verificar:</text>
  <text x="490" y="285" class="small">• Versión RHEL</text>
  <text x="490" y="300" class="small">• Versión OpenSSL</text>
  <text x="490" y="315" class="small">• Crypto-policies</text>
  <rect x="480" y="325" width="220" height="15" rx="2" fill="#FFF3CD" stroke="#F57C00"/>
  <text x="590" y="337" text-anchor="middle" class="code" fill="#F57C00">→ ¿Conflictos de política?</text>

  <!-- Arrow from Analysis Container to Step 4 -->
  <path d="M 730 210 L 755 210" class="arrow"/>

  <!-- Step 4: Compile Findings -->
  <rect x="760" y="55" width="210" height="310" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="2"/>
  <text x="865" y="80" text-anchor="middle" class="section-title">4. Compilar Hallazgos</text>

  <text x="775" y="110" class="label">HALLAZGOS:</text>
  <rect x="775" y="120" width="180" height="25" rx="2" fill="#FFEBEE" stroke="#E53935"/>
  <text x="865" y="138" text-anchor="middle" class="code">📋 Certificados Expirados</text>
  <rect x="775" y="150" width="180" height="25" rx="2" fill="#FFF3CD" stroke="#F57C00"/>
  <text x="865" y="168" text-anchor="middle" class="code">📋 Problemas de Permisos</text>
  <rect x="775" y="180" width="180" height="25" rx="2" fill="#FFF3CD" stroke="#F57C00"/>
  <text x="865" y="198" text-anchor="middle" class="code">📋 Errores de Config</text>
  <rect x="775" y="210" width="180" height="25" rx="2" fill="#FFF3CD" stroke="#F57C00"/>
  <text x="865" y="228" text-anchor="middle" class="code">📋 Denegaciones SELinux</text>
  <rect x="775" y="240" width="180" height="25" rx="2" fill="#E8F5E9" stroke="#388E3C"/>
  <text x="865" y="258" text-anchor="middle" class="code">📋 Problemas de Sistema</text>

  <text x="775" y="290" class="small">Organizar por categoría</text>
  <text x="775" y="308" class="small">y severidad para el</text>
  <text x="775" y="326" class="small">siguiente paso...</text>

  <!-- Arrow from Step 4 to Step 5 -->
  <path d="M 865 365 L 865 395 L 500 395 L 500 425" class="arrow"/>

  <!-- Step 5: Priority Section -->
  <rect x="30" y="430" width="940" height="110" rx="6" fill="#FFF9C4" stroke="#F57C00" stroke-width="2"/>
  <text x="500" y="455" text-anchor="middle" class="section-title">5. Priorizar Problemas</text>

  <rect x="60" y="475" width="200" height="50" rx="4" fill="#E53935" stroke="#C62828" stroke-width="1"/>
  <text x="160" y="498" text-anchor="middle" class="label" fill="#fff">P1 - Crítico</text>
  <text x="160" y="515" text-anchor="middle" class="small" fill="#fff">Servicio caído/riesgo seguridad</text>

  <rect x="280" y="475" width="200" height="50" rx="4" fill="#F57C00" stroke="#E65100" stroke-width="1"/>
  <text x="380" y="498" text-anchor="middle" class="label" fill="#fff">P2 - Alto</text>
  <text x="380" y="515" text-anchor="middle" class="small" fill="#fff">Fallo inminente</text>

  <rect x="500" y="475" width="200" height="50" rx="4" fill="#FFC107" stroke="#FF8F00" stroke-width="1"/>
  <text x="600" y="498" text-anchor="middle" class="label">P3 - Medio</text>
  <text x="600" y="515" text-anchor="middle" class="small">Mejoras de config</text>

  <rect x="720" y="475" width="200" height="50" rx="4" fill="#4CAF50" stroke="#388E3C" stroke-width="1"/>
  <text x="820" y="498" text-anchor="middle" class="label" fill="#fff">P4 - Bajo</text>
  <text x="820" y="515" text-anchor="middle" class="small" fill="#fff">Mejores prácticas</text>

  <!-- Arrow from Step 5 to Steps 6-7 -->
  <path d="M 500 540 L 500 555" class="arrow"/>

  <!-- Steps 6 and 7 -->
  <rect x="30" y="560" width="450" height="100" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="255" y="585" text-anchor="middle" class="section-title" fill="#1976D2">6. Crear Plan de Acción</text>
  <text x="50" y="610" class="small">Para cada problema:</text>
  <text x="60" y="628" class="code">• Problema: Descripción</text>
  <text x="60" y="643" class="code">• Corrección: Paso a paso</text>
  <text x="250" y="628" class="code">• Prueba: Cómo verificar</text>
  <text x="250" y="643" class="code">• Prevenir: Prevención futura</text>

  <rect x="500" y="560" width="470" height="100" rx="6" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="735" y="585" text-anchor="middle" class="section-title" fill="#388E3C">7. Entregar Análisis</text>
  <text x="520" y="610" class="small">📄 Análisis Completo:</text>
  <text x="530" y="628" class="code">• Documento de hallazgos</text>
  <text x="530" y="643" class="code">• Plan de acción</text>
  <text x="740" y="628" class="code">• Comandos a ejecutar</text>
  <text x="740" y="643" class="code">• Pasos de prevención</text>

  <!-- Final -->
  <ellipse cx="500" cy="720" rx="150" ry="30" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="500" y="725" text-anchor="middle" class="label" fill="#388E3C">Análisis SOS Report Entregado</text>

  <path d="M 500 660 L 500 690" class="arrow"/>
</svg>
