<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
      .arrow { stroke: #1976D2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Formatos de Certificado PEM vs DER</text>

  <!-- PEM Format Section -->
  <rect x="30" y="50" width="450" height="280" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <rect x="40" y="60" width="430" height="35" rx="4" fill="#388E3C"/>
  <text x="255" y="85" text-anchor="middle" class="section-title" fill="#fff">Formato PEM (Privacy Enhanced Mail)</text>

  <!-- PEM Structure -->
  <rect x="60" y="110" width="390" height="120" rx="4" fill="#fff" stroke="#388E3C" stroke-width="1"/>
  <text x="255" y="135" text-anchor="middle" class="code">-----BEGIN CERTIFICATE-----</text>
  <text x="255" y="160" text-anchor="middle" class="code">MIIDXTCCAkWgAwIBAgIJAKJ3vF...</text>
  <text x="255" y="180" text-anchor="middle" class="small" fill="#999">Datos codificados Base64 (texto ASCII)</text>
  <text x="255" y="200" text-anchor="middle" class="small" fill="#999">Múltiples líneas, legible por humanos</text>
  <text x="255" y="220" text-anchor="middle" class="code">-----END CERTIFICATE-----</text>

  <!-- PEM Features -->
  <rect x="60" y="240" width="390" height="75" rx="4" fill="#D4EDDA" stroke="#388E3C" stroke-width="1"/>
  <text x="255" y="260" text-anchor="middle" class="label">Características</text>
  <text x="80" y="280" class="small">✓ Formato texto, seguro para email</text>
  <text x="80" y="295" class="small">✓ Se puede ver en editor texto</text>
  <text x="265" y="280" class="small">✓ Múltiples certs en un archivo</text>
  <text x="265" y="295" class="small">✓ Por defecto en Linux/RHEL</text>

  <!-- DER Format Section -->
  <rect x="520" y="50" width="450" height="280" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <rect x="530" y="60" width="430" height="35" rx="4" fill="#1976D2"/>
  <text x="745" y="85" text-anchor="middle" class="section-title" fill="#fff">Formato DER (Distinguished Encoding Rules)</text>

  <!-- DER Structure -->
  <rect x="550" y="110" width="390" height="120" rx="4" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <rect x="570" y="130" width="350" height="80" rx="4" fill="#CFE2FF"/>
  <text x="745" y="160" text-anchor="middle" class="label">Datos Binarios</text>
  <text x="745" y="180" text-anchor="middle" class="small" fill="#666">No legible por humanos</text>
  <text x="745" y="195" text-anchor="middle" class="small" fill="#666">Formato compacto</text>

  <!-- DER Features -->
  <rect x="550" y="240" width="390" height="75" rx="4" fill="#CFE2FF" stroke="#1976D2" stroke-width="1"/>
  <text x="745" y="260" text-anchor="middle" class="label">Características</text>
  <text x="570" y="280" class="small">✓ Formato binario, archivo más pequeño</text>
  <text x="570" y="295" class="small">✓ Análisis más rápido</text>
  <text x="775" y="280" class="small">✗ No legible por humanos</text>
  <text x="775" y="295" class="small">✗ Solo un certificado</text>

  <!-- Conversion Section -->
  <rect x="30" y="350" width="940" height="100" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="500" y="375" text-anchor="middle" class="section-title" fill="#F57C00">Comandos de Conversión</text>

  <!-- PEM to DER -->
  <rect x="60" y="390" width="400" height="45" rx="4" fill="#fff" stroke="#F57C00" stroke-width="1"/>
  <text x="260" y="410" text-anchor="middle" class="label">PEM → DER</text>
  <text x="260" y="428" text-anchor="middle" class="code">openssl x509 -in cert.pem -outform DER -out cert.der</text>

  <!-- DER to PEM -->
  <rect x="540" y="390" width="400" height="45" rx="4" fill="#fff" stroke="#F57C00" stroke-width="1"/>
  <text x="740" y="410" text-anchor="middle" class="label">DER → PEM</text>
  <text x="740" y="428" text-anchor="middle" class="code">openssl x509 -in cert.der -inform DER -outform PEM -out cert.pem</text>

  <!-- When to Use Section -->
  <rect x="30" y="470" width="450" height="110" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="255" y="495" text-anchor="middle" class="section-title" fill="#388E3C">Usar PEM Cuando</text>
  <text x="60" y="520" class="small">• Sistemas Linux/RHEL</text>
  <text x="60" y="538" class="small">• Servidores web Apache, NGINX</text>
  <text x="60" y="556" class="small">• Mayoría de herramientas CLI</text>
  <text x="250" y="520" class="small">• Archivos cadena/bundle certificados</text>
  <text x="250" y="538" class="small">• Repositorios Git</text>
  <text x="250" y="556" class="small">• Inspección humana necesaria</text>

  <rect x="520" y="470" width="450" height="110" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="745" y="495" text-anchor="middle" class="section-title" fill="#1976D2">Usar DER Cuando</text>
  <text x="550" y="520" class="small">• Servidores Windows/IIS</text>
  <text x="550" y="538" class="small">• Keystores Java (JKS)</text>
  <text x="550" y="556" class="small">• Algunas aplicaciones móviles</text>
  <text x="750" y="520" class="small">• Protocolos binarios</text>
  <text x="750" y="538" class="small">• Sistemas con espacio limitado</text>
  <text x="750" y="556" class="small">• Apps críticas en rendimiento</text>
</svg>
