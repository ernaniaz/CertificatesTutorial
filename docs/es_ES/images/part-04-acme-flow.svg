<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #333; }
      .arrow { stroke: #1976D2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-back { stroke: #388E3C; stroke-width: 2; fill: none; marker-end: url(#arrowhead-green); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#388E3C" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Flujo del Protocolo ACME (Let's Encrypt)</text>

  <!-- Participants -->
  <rect x="50" y="50" width="130" height="45" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="115" y="72" text-anchor="middle" class="label">Cliente ACME</text>
  <text x="115" y="88" text-anchor="middle" class="code">(certbot)</text>

  <rect x="300" y="50" width="150" height="45" rx="6" fill="#388E3C" stroke="#2E7D32" stroke-width="2"/>
  <text x="375" y="72" text-anchor="middle" class="label" fill="#fff">Servidor ACME</text>
  <text x="375" y="88" text-anchor="middle" class="code" fill="#fff">(Let's Encrypt)</text>

  <rect x="570" y="50" width="130" height="45" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="635" y="72" text-anchor="middle" class="label">Servidor de</text>
  <text x="635" y="88" text-anchor="middle" class="code">Validación</text>

  <rect x="820" y="50" width="130" height="45" rx="6" fill="#7B1FA2" stroke="#6A1B9A" stroke-width="2"/>
  <text x="885" y="72" text-anchor="middle" class="label" fill="#fff">Tu Servidor</text>
  <text x="885" y="88" text-anchor="middle" class="code" fill="#fff">Web</text>

  <!-- Lifelines -->
  <line x1="115" y1="95" x2="115" y2="580" stroke="#1976D2" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="375" y1="95" x2="375" y2="580" stroke="#388E3C" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="635" y1="95" x2="635" y2="400" stroke="#F57C00" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="885" y1="95" x2="885" y2="580" stroke="#7B1FA2" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Step 1: Account Registration -->
  <path d="M 120 130 L 365 130" class="arrow"/>
  <text x="243" y="125" text-anchor="middle" class="small">1. Registro de Cuenta (si es primera vez)</text>

  <path d="M 365 150 L 120 150" class="arrow-back"/>
  <text x="243" y="165" text-anchor="middle" class="code">Cuenta Creada</text>

  <!-- Step 2: New Order -->
  <path d="M 120 190 L 365 190" class="arrow"/>
  <text x="243" y="185" text-anchor="middle" class="small">2. Nueva Solicitud: dominio=ejemplo.com</text>

  <path d="M 365 210 L 120 210" class="arrow-back"/>
  <text x="243" y="225" text-anchor="middle" class="code">Orden Creada + Desafíos</text>

  <!-- Challenge Types Box -->
  <rect x="180" y="235" width="200" height="50" rx="4" fill="#FFC107" stroke="#F57C00" stroke-width="1"/>
  <text x="280" y="255" text-anchor="middle" class="small">Tipos de Desafío:</text>
  <text x="280" y="275" text-anchor="middle" class="code">HTTP-01, DNS-01, TLS-ALPN-01</text>

  <!-- Step 3: Place Challenge -->
  <path d="M 120 310 L 875 310" class="arrow"/>
  <text x="500" y="305" text-anchor="middle" class="small">3. Colocar Archivo Desafío: /.well-known/acme-challenge/token</text>

  <!-- Step 4: Ready for Validation -->
  <path d="M 120 340 L 365 340" class="arrow"/>
  <text x="243" y="355" text-anchor="middle" class="small">4. Listo para Validación</text>

  <!-- Step 5-6: Verification -->
  <path d="M 385 370 L 625 370" class="arrow"/>
  <text x="505" y="365" text-anchor="middle" class="small">5. Verificar Desafío</text>

  <path d="M 645 390 L 875 390" class="arrow"/>
  <text x="760" y="385" text-anchor="middle" class="small">6. HTTP GET /acme-challenge/token</text>

  <path d="M 875 410 L 645 410" class="arrow-back"/>
  <text x="760" y="425" text-anchor="middle" class="code">Respuesta del Desafío</text>

  <path d="M 625 440 L 385 440" class="arrow-back"/>
  <text x="505" y="455" text-anchor="middle" class="code">Resultado Validación</text>

  <!-- Success Path -->
  <rect x="30" y="470" width="460" height="110" rx="6" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="260" y="495" text-anchor="middle" class="section-title" fill="#388E3C">Desafío Superado</text>

  <path d="M 365 510 L 120 510" class="arrow-back"/>
  <text x="243" y="525" text-anchor="middle" class="small">✓ Dominio Validado</text>

  <path d="M 120 540 L 365 540" class="arrow"/>
  <text x="243" y="555" text-anchor="middle" class="small">7. Enviar CSR</text>

  <path d="M 365 560 L 120 560" class="arrow-back"/>
  <text x="243" y="575" text-anchor="middle" class="code">✓ ¡Certificado Emitido!</text>

  <!-- Failure Path -->
  <rect x="510" y="470" width="250" height="110" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="635" y="495" text-anchor="middle" class="section-title" fill="#E53935">Desafío Fallido</text>
  <text x="530" y="520" class="small" fill="#E53935">✗ Validación Fallida</text>
  <text x="530" y="540" class="small">Reintentar o verificar:</text>
  <text x="540" y="555" class="code">- Propagación DNS</text>
  <text x="640" y="555" class="code">- Reglas firewall</text>

  <!-- Post-issuance -->
  <rect x="780" y="470" width="190" height="110" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="875" y="495" text-anchor="middle" class="section-title" fill="#1976D2">Post-Emisión</text>
  <text x="800" y="520" class="small">9. Instalar Certificado</text>
  <text x="800" y="540" class="small">10. Config Auto-Renovación</text>
  <text x="810" y="560" class="code">cron / systemd timer</text>

  <!-- Footer -->
  <rect x="30" y="600" width="940" height="80" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="500" y="625" text-anchor="middle" class="section-title">Ciclo de Vida del Certificado</text>
  <text x="200" y="655" text-anchor="middle" class="small">Válido: 90 días</text>
  <text x="500" y="655" text-anchor="middle" class="small">Auto-renovación: a los 60 días (30 días antes de expirar)</text>
  <text x="800" y="655" text-anchor="middle" class="small">Comando: certbot renew</text>
</svg>
