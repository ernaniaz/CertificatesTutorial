<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #333; }
      .arrow { stroke: #1976D2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Pasos de Migración de Certificados RHEL 8 → 9</text>

  <!-- Start -->
  <ellipse cx="100" cy="70" rx="85" ry="28" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="100" y="68" text-anchor="middle" class="label">RHEL 8→9</text>
  <text x="100" y="83" text-anchor="middle" class="small">Migración</text>

  <!-- CRITICAL Warning -->
  <rect x="210" y="50" width="280" height="45" rx="6" fill="#E53935" stroke="#C62828" stroke-width="3"/>
  <text x="350" y="73" text-anchor="middle" class="section-title" fill="#fff">⚠️ CRÍTICO: ¡SHA-1 BLOQUEADO!</text>
  <text x="350" y="88" text-anchor="middle" class="small" fill="#fff">Política DEFAULT bloquea SHA-1 completamente</text>
  <path d="M 185 70 L 210 70" class="arrow"/>

  <!-- Phase 1: SHA-1 Scan -->
  <rect x="30" y="125" width="140" height="35" rx="4" fill="#E53935" stroke="#C62828" stroke-width="2"/>
  <text x="100" y="148" text-anchor="middle" class="label" fill="#fff">Fase 1: Buscar SHA-1</text>
  <path d="M 100 98 L 100 125" class="arrow"/>

  <rect x="30" y="185" width="200" height="70" rx="4" fill="#FFEBEE" stroke="#E53935" stroke-width="1"/>
  <text x="130" y="205" text-anchor="middle" class="section-title" fill="#E53935">Buscar TODOS Certs SHA-1</text>
  <text x="45" y="225" class="code">find /etc/pki -name '*.crt'</text>
  <text x="45" y="240" class="code">| openssl x509 | grep sha1</text>
  <path d="M 100 160 L 100 185" class="arrow"/>

  <!-- SHA-1 Decision -->
  <polygon points="130,280 200,310 130,340 60,310" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="130" y="305" text-anchor="middle" class="small">¿SHA-1</text>
  <text x="130" y="320" text-anchor="middle" class="small">Encontrado?</text>
  <path d="M 130 255 L 130 280" class="arrow"/>

  <!-- Must Regenerate -->
  <rect x="250" y="275" width="180" height="70" rx="4" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="340" y="300" text-anchor="middle" class="section-title" fill="#E53935">DEBE REGENERAR</text>
  <text x="265" y="320" class="small">SHA-1 completamente bloqueado</text>
  <text x="265" y="335" class="small">Usar SHA-256 o superior</text>
  <path d="M 200 310 L 250 310" class="arrow"/>
  <text x="220" y="300" class="small" fill="#E53935">Sí</text>

  <!-- Phase 2: Verificar SANs -->
  <rect x="460" y="125" width="140" height="35" rx="4" fill="#1976D2" stroke="#0D47A1" stroke-width="2"/>
  <text x="530" y="148" text-anchor="middle" class="label" fill="#fff">Fase 2: Verificar SANs</text>
  <path d="M 130 340 L 130 360 L 530 360 L 530 243" class="arrow"/>
  <path d="M 430 310 L 530 310" stroke="#1976D2" stroke-width="1.5" fill="none"/>
  <text x="145" y="350" class="small">Sin SHA-1</text>

  <rect x="460" y="185" width="180" height="60" rx="4" fill="#FFF3E0" stroke="#F57C00" stroke-width="1"/>
  <text x="550" y="205" text-anchor="middle" class="section-title" fill="#F57C00">Encontrar SANs Faltantes</text>
  <text x="470" y="225" class="small">CN-solo obsoleto en OpenSSL 3</text>
  <text x="470" y="240" class="small">Regenerar con SANs adecuados</text>
  <path d="M 530 160 L 530 185" class="arrow"/>

  <!-- Phase 3: Verificar Claves -->
  <rect x="680" y="125" width="140" height="35" rx="4" fill="#1976D2" stroke="#0D47A1" stroke-width="2"/>
  <text x="750" y="148" text-anchor="middle" class="label" fill="#fff">Fase 3: Verificar Claves</text>
  <path d="M 640 215 L 680 215" class="arrow"/>

  <rect x="680" y="185" width="200" height="60" rx="4" fill="#FFF3E0" stroke="#F57C00" stroke-width="1"/>
  <text x="780" y="205" text-anchor="middle" class="section-title" fill="#F57C00">Verificar Tamaños de Clave</text>
  <text x="695" y="225" class="small">RSA &lt; 2048 bits bloqueado</text>
  <text x="695" y="240" class="small">Usar RSA 2048+ o ECC P-256+</text>
  <path d="M 750 160 L 750 185" class="arrow"/>

  <!-- Fase 4: Respaldo -->
  <rect x="680" y="270" width="200" height="70" rx="4" fill="#FCE4EC" stroke="#E91E63" stroke-width="1"/>
  <text x="780" y="295" text-anchor="middle" class="section-title" fill="#E91E63">Fase 4: Respaldo</text>
  <text x="695" y="315" class="small">• Todos los certificados</text>
  <text x="695" y="330" class="small">• Configs de OpenSSL</text>
  <path d="M 780 245 L 780 270" class="arrow"/>

  <!-- Phase 5: Prueba -->
  <rect x="680" y="365" width="200" height="70" rx="4" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
  <text x="780" y="390" text-anchor="middle" class="section-title" fill="#388E3C">Fase 5: Probar en RHEL 9</text>
  <text x="695" y="410" class="small">• Desplegar certs en prueba</text>
  <text x="695" y="425" class="small">• Verificar avisos de obsolescencia</text>
  <path d="M 780 340 L 780 365" class="arrow"/>

  <!-- Phase 6: Migrar -->
  <rect x="460" y="365" width="180" height="70" rx="4" fill="#E53935" stroke="#C62828" stroke-width="1"/>
  <text x="550" y="390" text-anchor="middle" class="section-title" fill="#fff">Fase 6: Migrar</text>
  <text x="550" y="415" text-anchor="middle" class="label" fill="#fff">Actualizar a RHEL 9</text>
  <path d="M 680 400 L 640 400" class="arrow"/>

  <!-- OpenSSL 3.x Active -->
  <rect x="460" y="460" width="420" height="50" rx="6" fill="#388E3C" stroke="#2E7D32" stroke-width="2"/>
  <text x="670" y="485" text-anchor="middle" class="section-title" fill="#fff">¡NUEVO: OpenSSL 3.x Activo!</text>
  <text x="670" y="500" text-anchor="middle" class="small" fill="#fff">Valores más estrictos • Provider legacy para algos antiguos</text>
  <path d="M 550 435 L 550 460" class="arrow"/>

  <!-- Phase 7: Verificación -->
  <rect x="30" y="460" width="390" height="110" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="225" y="485" text-anchor="middle" class="section-title" fill="#1976D2">Fase 7: Verificación</text>

  <rect x="45" y="500" width="170" height="65" rx="3" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="130" y="520" text-anchor="middle" class="small">Verificar cada servicio:</text>
  <text x="55" y="538" class="code">1. Versión OpenSSL</text>
  <text x="55" y="553" class="code">2. Conexiones TLS</text>

  <rect x="235" y="500" width="170" height="65" rx="3" fill="#fff" stroke="#1976D2" stroke-width="1"/>
  <text x="320" y="520" text-anchor="middle" class="small">Verificar logs por:</text>
  <text x="245" y="538" class="code">• 'legacy provider'</text>
  <text x="245" y="553" class="code">• 'deprecated'</text>

  <path d="M 460 485 L 420 485" class="arrow"/>

  <!-- Issues Decision -->
  <polygon points="225,600 295,630 225,660 155,630" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="225" y="635" text-anchor="middle" class="small">¿Problemas?</text>
  <path d="M 225 570 L 225 600" class="arrow"/>

  <!-- Legacy Provider Warning -->
  <rect x="30" y="690" width="180" height="60" rx="4" fill="#FFC107" stroke="#FF8F00" stroke-width="1"/>
  <text x="120" y="715" text-anchor="middle" class="section-title">Provider Legacy</text>
  <text x="45" y="735" class="small">⚠️ ¡Solo temporal!</text>
  <path d="M 155 630 L 120 630 L 120 690" class="arrow"/>
  <text x="90" y="620" class="small">Algos Legacy</text>

  <rect x="250" y="690" width="180" height="60" rx="4" fill="#FFF3CD" stroke="#F57C00" stroke-width="1"/>
  <text x="340" y="715" text-anchor="middle" class="section-title" fill="#F57C00">Corregir Certs</text>
  <text x="265" y="735" class="small">Regenerar/Agregar SANs</text>
  <path d="M 225 660 L 225 720 L 250 720" class="arrow"/>

  <!-- Monitor -->
  <rect x="460" y="600" width="200" height="60" rx="4" fill="#CFE2FF" stroke="#1976D2" stroke-width="1"/>
  <text x="560" y="625" text-anchor="middle" class="section-title" fill="#1976D2">Fase 8: Monitorear</text>
  <text x="475" y="645" class="small">Observar avisos de obsolescencia</text>
  <path d="M 295 630 L 460 630" class="arrow"/>
  <text x="375" y="620" class="small">Ninguno</text>

  <!-- Fix paths to monitor -->
  <path d="M 120 750 L 120 770 L 560 770 L 560 660" stroke="#F57C00" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
  <path d="M 340 750 L 340 770" stroke="#F57C00" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>

  <!-- Completa -->
  <ellipse cx="560" cy="720" rx="100" ry="30" fill="#D4EDDA" stroke="#388E3C" stroke-width="2"/>
  <text x="560" y="725" text-anchor="middle" class="label" fill="#388E3C">✓ Migración Completa</text>
  <path d="M 560 660 L 560 690" class="arrow"/>

  <!-- Phase Out Note -->
  <rect x="680" y="600" width="200" height="80" rx="4" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="780" y="625" text-anchor="middle" class="section-title">Si Usa Legacy</text>
  <text x="695" y="645" class="small">Planificar eliminación:</text>
  <text x="705" y="660" class="code">1. Identificar dependencias</text>
  <text x="705" y="675" class="code">2. Migrar a moderno</text>
  <path d="M 660 630 L 680 630" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="3,2" fill="none"/>
</svg>
